      ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = Math.max(1, 2 * sc);

    const lg = ctx.createRadialGradient(W / 2, horizonY, 4, W / 2, horizonY, W * 0.16);

    const nSw = nodes.get(swp.node);

    ctx.lineWidth = 4; ctx.strokeStyle = "#e08b1d"; ctx.stroke();

  if (t.warn > 0){

function drawCabFrame(t, dt){

  ctx.strokeStyle = "#8a613a"; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(lx - lw / 2, ly); ctx.lineTo(lx + lw / 2, ly); ctx.stroke();
  const hxp = lx - lw / 2 + lw * t.slider;
  ctx.strokeStyle = "#2f2f36"; ctx.lineWidth = 9; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(hxp, ly + 4); ctx.lineTo(hxp + lw * 0.1, ly - fh * 0.3); ctx.stroke();
  ctx.fillStyle = "#e0393e";
  ctx.beginPath(); ctx.arc(hxp + lw * 0.1, ly - fh * 0.3, 11, 0, TAU); ctx.fill();

function quantAngle(a){ return Math.round(a / (Math.PI / 4)) * (Math.PI / 4); }
/* validez de una pieza candidata (muestrea y comprueba distancias) */
function pieceClear(piece, ignoreNodeA, ignoreNodeB){
  const P = [];
  for (let i = 0; i <= 6; i++){
    P.push(cubic(piece.p0[0], piece.p0[1], piece.c1[0], piece.c1[1], piece.c2[0], piece.c2[1], piece.p3[0], piece.p3[1], i / 6));
  }
  for (const [x, y] of P){
    if (x < 40 || y < 40 || x > WORLD.w - 40 || y > WORLD.h - 40) return false;
  }
  for (const sg of segs.values()){
    const touchesIgnored = sg.a === ignoreNodeA || sg.b === ignoreNodeA || sg.a === ignoreNodeB || sg.b === ignoreNodeB;
    for (let i = touchesIgnored ? 2 : 0; i < P.length - (touchesIgnored ? 2 : 0); i++){
      const [x, y] = P[i];
      for (let k = 0; k < sg.px.length; k += 2){
        if (dist2(x, y, sg.px[k], sg.py[k]) < 23 * 23) return false;
      }
    }
  }
  return true;
}
function buildPointerDown(wx, wy){
  if (buildTool !== "track") return false;
  const tol = Math.max(30, 40 / cam.z);
  const n = nearestNode(wx, wy, tol);
  if (!n) return false;
  let dirA = null;
  if (n.segs.length === 1){
    const sg = segs.get(n.segs[0]);
    const [ox, oy] = outwardTangent(sg, n.id);
    dirA = Math.atan2(-oy, -ox); // hacia el vacío
  }

}
function buildPointerMove(wx, wy){
  const bd = buildDrag;
  if (!bd) return;
  const E = bd.endNode;
  const vx = wx - E.x, vy = wy - E.y;
  const vlen = Math.hypot(vx, vy);
  bd.cand = null;
  if (vlen < 30) return;
  // si empezamos en un nodo interior, elegir dirección al arrastrar (crea desvío)
  if (bd.dirA === null){
    const a = quantAngle(Math.atan2(vy, vx));
    // debe alejarse de las tangentes existentes
    let ok = true;
    for (const sId of E.segs){
      const [tx2, ty2] = outwardTangent(segs.get(sId), E.id);
      const d = Math.cos(a) * tx2 + Math.sin(a) * ty2;
      if (d > 0.94) { ok = false; break; } // casi paralela a una vía existente
    }
    if (!ok){ bd.cand = { invalid: true }; return; }
    bd.dirA = a;
  }
  const relA = angNorm(Math.atan2(vy, vx) - bd.dirA);
  let piece = null, kind = "";
  if (Math.abs(relA) < Math.PI / 8){ piece = straightPiece(E.x, E.y, bd.dirA, PIECE_LEN); kind = "straight"; }
  else if (relA >= Math.PI / 8 && relA < Math.PI * 0.62){ piece = arcPiece(E.x, E.y, bd.dirA, Math.PI / 4, PIECE_R); kind = "curve"; }
  else if (relA <= -Math.PI / 8 && relA > -Math.PI * 0.62){ piece = arcPiece(E.x, E.y, bd.dirA, -Math.PI / 4, PIECE_R); kind = "curve"; }
  else return; // arrastre hacia atrás
  // ¿soldar con un nodo cercano?
  const weldTol = Math.max(34, 40 / cam.z);
  const target = nearestNode(wx, wy, weldTol);
  if (target && target !== E && dist(target.x, target.y, E.x, E.y) > 46){
    const apx = target.x - E.x, apy = target.y - E.y;
    const alen = Math.hypot(apx, apy) || 1;
    const ax = apx / alen, ay = apy / alen;
    const d0x = Math.cos(bd.dirA), d0y = Math.sin(bd.dirA);
    if (alen < 260 && d0x * ax + d0y * ay > 0.35){
      // ¿tangente compatible con alguna vía del nodo? (o nodo libre)
      let okAngle = target.segs.length === 0;
      for (const sId of target.segs){
        const [tx2, ty2] = outwardTangent(segs.get(sId), target.id);
        if (ax * tx2 + ay * ty2 > 0.25) okAngle = true;
      }
      if (okAngle && target.segs.length < 4){
        const k = alen / 3;
        const conn = {
          p0: [E.x, E.y], p3: [target.x, target.y],
          c1: [E.x + d0x * k, E.y + d0y * k],
          c2: [target.x - ax * k, target.y - ay * k],
          endA: Math.atan2(ay, ax)

        bd.cand = { piece: conn, kind: "weld", weldNode: target, valid };
        return;

  const valid = pieceClear(piece, E.id, -1);
  bd.cand = { piece, kind, valid };
  // confirmar pieza si el arrastre va más allá de su final
  if (valid && kind !== "weld"){
    const dEnd = dist(wx, wy, piece.p3[0], piece.p3[1]);
    const dStart = vlen;

    }
  }
}

/* ---------- herramienta UNIR: cerrar circuitos con curvas suaves ---------- */
function voidDir(node){
  // dirección hacia el vacío en un extremo libre (segs.length === 1)
  const sg = segs.get(node.segs[0]);
  const [ox, oy] = outwardTangent(sg, node.id); // apunta hacia la vía existente
  return [-ox, -oy]; // hacia el vacío
}
function joinConnector(A, B){
  // bezier que sale de A por su dirección al vacío y entra en B por la suya
  const [avx, avy] = voidDir(A);
  const [bvx, bvy] = voidDir(B);
  const d = dist(A.x, A.y, B.x, B.y);
  const k = clamp(d / 2.6, 34, 220);
  return {
    p0: [A.x, A.y], p3: [B.x, B.y],
    c1: [A.x + avx * k, A.y + avy * k],
    c2: [B.x + bvx * k, B.y + bvy * k]
  };
}
function joinTapAt(wx, wy){
  const tol = Math.max(34, 44 / cam.z);
  const n = nearestNode(wx, wy, tol);
  if (!n || n.segs.length !== 1){
    Snd.deny();
    toastMsg("🔗", "Toca un extremo libre ✨ de la vía");
    joinFrom = null;
    return;
  }
  if (!joinFrom){
    joinFrom = n.id;
    Snd.pop();
    ui.buildHint.textContent = "Ahora toca el otro extremo ✨ para unirlos 🔗";
    return;
  }
  if (joinFrom === n.id){ // deseleccionar el mismo extremo
    joinFrom = null;
    Snd.pop();
    ui.buildHint.textContent = "Toca dos extremos ✨ para unirlos y cerrar el circuito 🔗";
    return;
  }
  const A = nodes.get(joinFrom);
  if (!A || A.segs.length !== 1){ joinFrom = null; return; }
  const conn = joinConnector(A, n);
  if (!pieceClear(conn, A.id, n.id)){
    Snd.deny();
    toastMsg("🔗", "No caben las vías por ahí, prueba otro trazado");
    deniedFlash = { x: A.x, y: A.y, t: 0.6, seg: -1 };
    return;
  }
  addSeg(A.id, n.id, conn.c1[0], conn.c1[1], conn.c2[0], conn.c2[1]);
  joinFrom = null;
  buildCount++;
  if (buildCount >= 10) achieve("constructor");
  for (let i = 0; i < 6; i++) spawnSteam(n.x + rand(-10, 10), n.y + rand(-8, 8));
  Snd.pop();
  toastMsg("🔗", "¡Vías unidas! Circuito cerrado");
  ui.buildHint.textContent = "Toca dos extremos ✨ para unirlos y cerrar el circuito 🔗";
  recomputeTunnelMouths();
  saveSoon();

/* rutas que referencian segmentos borrados */
function sanitizeRoutes(){
  for (const t of trains){
    let broken = false;
    for (const r of t.route) if (!segs.has(r.seg)) { broken = true; break; }
    if (!broken) continue;
    // conservar el registro donde está la cabeza
    let idx = t.route.length - 1;
    while (idx > 0 && t.cum[idx] > t.headS) idx--;
    const rec = t.route[idx];
    if (!segs.has(rec.seg)){ removeTrain(t); continue; }
    const local = t.headS - t.cum[idx];
    t.route = [{ seg: rec.seg, dir: rec.dir }];
    t.headS = local;
    rebuildCum(t);
    t.headS = clamp(t.headS, Math.min(trainLength(t), t.total), t.total);
    ensureBack(t);
  }
}

    if (n.segs.length === 1){

      ctx.fillStyle = `rgba(255,255,180,${0.25 + pulse * 0.3})`;
      ctx.beginPath(); ctx.arc(n.x, n.y, 22 + pulse * 6, 0, TAU); ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(n.x, n.y, 9, 0, TAU); ctx.fill();
      ctx.fillStyle = "#ffd94d";
      ctx.beginPath(); ctx.arc(n.x, n.y, 6, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.beginPath(); ctx.arc(n.x, n.y, 4.5, 0, TAU); ctx.fill();
    }
  }
  // herramienta unir: resaltar el primer extremo elegido
  if (buildTool === "join" && joinFrom != null){
    const jn = nodes.get(joinFrom);
    if (jn){
      ctx.save();
      ctx.strokeStyle = "#37b24d";
      ctx.lineWidth = 5;
      ctx.setLineDash([8, 6]);
      ctx.lineDashOffset = -gameTime * 20;
      ctx.beginPath(); ctx.arc(jn.x, jn.y, 24 + pulse * 5, 0, TAU); ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  if (buildDrag && buildDrag.cand && buildDrag.cand.piece){
    const c = buildDrag.cand;
    const p = c.piece;
    ctx.strokeStyle = c.valid ? "rgba(80,220,90,.75)" : "rgba(230,60,50,.75)";
    ctx.lineWidth = 14; ctx.lineCap = "round";
    ctx.beginPath();
    for (let i = 0; i <= 10; i++){

    }
    ctx.stroke();
    if (c.weldNode){
      ctx.strokeStyle = c.valid ? "#37b24d" : "#d9534f";
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(c.weldNode.x, c.weldNode.y, 18 + pulse * 4, 0, TAU); ctx.stroke();
    }
  }
  // flash de denegado (borrar tramo ocupado)
  if (deniedFlash){
    deniedFlash.t -= 0.016;
    if (deniedFlash.t <= 0) deniedFlash = null;
    else {
      const sg = segs.get(deniedFlash.seg);
      if (sg){
        ctx.strokeStyle = `rgba(230,60,50,${deniedFlash.t})`;
        ctx.lineWidth = 16; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sg.px[0], sg.py[0]);
        for (let i = 1; i < sg.px.length; i++) ctx.lineTo(sg.px[i], sg.py[i]);
        ctx.stroke();
      }
    }
  }
}

const pointers = new Map();

let longPressTimer = 0;

  const r = canvas.getBoundingClientRect();
  return [e.clientX - r.left, e.clientY - r.top];
}
function trainAt(wx, wy){
  const tol = Math.max(22, 28 / cam.z);
  for (const t of trains){
    for (const car of carList(t)){
      const p = trainPosAt(t, car.mid);
      if (dist2(wx, wy, p.x, p.y) < tol * tol) return t;

}
function switchNodeAt(sx, sy){
  for (const nodeId of switches.keys()){
    const n = nodes.get(nodeId);
    if (!n) continue;
    const [px, py] = proj(n.x, n.y);
    const r = Math.max(26, 24 * cam.z);
    if (dist2(sx, sy, px, py) < r * r) return nodeId;

}

function onPointerDown(e){
  e.preventDefault();
  firstGesture();

  const [sx, sy] = canvasPos(e);
  pointers.set(e.pointerId, { x: sx, y: sy });
  if (viewMode === "cab"){
    for (const h of cabSwitchHits){
      if (dist2(sx, sy, h.x, h.y) < h.r * h.r){ toggleSwitch(h.node); return; }
    }
    return;
  }
  if (pointers.size === 2){
    if (gesture && gesture.type === "build") buildDrag = null;
    clearTimeout(longPressTimer);
    dragGhost = null;
    const ps = [...pointers.values()];
    const mx = (ps[0].x + ps[1].x) / 2, my = (ps[0].y + ps[1].y) / 2;
    gesture = { type: "pinch", d0: Math.max(20, dist(ps[0].x, ps[0].y, ps[1].x, ps[1].y)), z0: cam.z, mx, my };
    return;
  }
  const [wx, wy] = unproj(sx, sy);
  if (buildMode && buildTool === "track" && buildPointerDown(wx, wy)){
    gesture = { type: "build", sx0: sx, sy0: sy };
    return;
  }
  if (sceneryMode && sceneryTool === "river"){
    riverDraw = [[wx, wy]];
    gesture = { type: "river", sx0: sx, sy0: sy };
    return;
  }
  const t = (!buildMode && !sceneryMode) ? trainAt(wx, wy) : null;
  if (t){
    gesture = { type: "trainpress", train: t, sx0: sx, sy0: sy, moved: false };
    clearTimeout(longPressTimer);
    longPressTimer = setTimeout(() => {
      if (gesture && gesture.type === "trainpress" && !gesture.moved && Math.abs(t.speed) < 2){
        gesture = { type: "dragtrain", train: t };
        dragGhost = { t, x: wx, y: wy, ok: true };

function onPointerMove(e){
  const p = pointers.get(e.pointerId);
  if (!p) return;
  const [sx, sy] = canvasPos(e);
  const dx = sx - p.x, dy = sy - p.y;
  p.x = sx; p.y = sy;
  if (viewMode === "cab") return;
  if (gesture && gesture.type === "pinch" && pointers.size >= 2){
    const ps = [...pointers.values()];
    const d = Math.max(20, dist(ps[0].x, ps[0].y, ps[1].x, ps[1].y));
    const mx = (ps[0].x + ps[1].x) / 2, my = (ps[0].y + ps[1].y) / 2;
    const [wx0, wy0] = unproj(mx, my);
    cam.z = clamp(gesture.z0 * d / gesture.d0, 0.42, 2.6);
    const [wx1, wy1] = unproj(mx, my);
    cam.x += wx0 - wx1; cam.y += wy0 - wy1;
    cam.x -= (mx - gesture.mx) / cam.z;
    cam.y -= (my - gesture.my) / (cam.z * SQ);
    gesture.mx = mx; gesture.my = my;
    cam.follow = 0; cam.zoomAnim = null;
    return;
  }
  if (!gesture) return;
  const [wx, wy] = unproj(sx, sy);
  if (gesture.type === "build"){ buildPointerMove(wx, wy); return; }
  if (gesture.type === "river"){
    if (riverDraw){
      const last = riverDraw[riverDraw.length - 1];
      if (dist(wx, wy, last[0], last[1]) > 22) riverDraw.push([wx, wy]);
    }
    return;
  }
  if (gesture.type === "dragtrain"){
    dragGhost.x = wx; dragGhost.y = wy;
    dragGhost.ok = !!nearestTrackPoint(wx, wy, 70);
    return;
  }
  if (gesture.type === "trainpress"){
    if (dist(sx, sy, gesture.sx0, gesture.sy0) > 12){
      clearTimeout(longPressTimer);
      gesture = { type: "pan", sx0: gesture.sx0, sy0: gesture.sy0, moved: true };
    }
    return;
  }
  if (gesture.type === "pan"){
    if (dist(sx, sy, gesture.sx0, gesture.sy0) > 8) gesture.moved = true;
    if (gesture.moved){
      cam.x -= dx / cam.z;
      cam.y -= dy / (cam.z * SQ);
      cam.x = clamp(cam.x, -250, WORLD.w + 250);

    }
  }

function onPointerUp(e){
  const p = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  clearTimeout(longPressTimer);
  if (viewMode === "cab"){ gesture = null; return; }
  if (!gesture) return;
  if (gesture.type === "pinch"){
    if (pointers.size < 2){
      const rest = [...pointers.values()];
      gesture = rest.length === 1 ? { type: "pan", sx0: rest[0].x, sy0: rest[0].y, moved: true } : null;
    }
    return;
  }
  const sx = p ? p.x : 0, sy = p ? p.y : 0;
  const [wx, wy] = unproj(sx, sy);
  const g = gesture;
  gesture = null;
  if (g.type === "build"){ buildPointerUp(wx, wy); return; }
  if (g.type === "river"){
    if (riverDraw && riverDraw.length >= 2){
      userRivers.push(riverDraw);
      for (const pt of riverDraw) if (Math.random() < 0.25) spawnSteam(pt[0] + rand(-8, 8), pt[1] + rand(-6, 6));
      Snd.pop();
      toastMsg("🌊", "¡Río dibujado!");
      saveSoon();
    }
    riverDraw = null;
    return;
  }
  if (g.type === "dragtrain"){
    const ok = relocateTrain(g.train, wx, wy);
    if (ok){ Snd.pop(); for (let i = 0; i < 6; i++) spawnSteam(wx + rand(-10, 10), wy + rand(-8, 8)); }
    else Snd.deny();
    dragGhost = null;
    return;
  }
  const moved = g.moved || (g.sx0 !== undefined && dist(sx, sy, g.sx0, g.sy0) > 10);
  if (moved) return;
  handleTap(sx, sy, wx, wy);
}
function handleTap(sx, sy, wx, wy){
  if (sceneryMode){
    if (sceneryTool === "erase"){ eraseSceneryAt(wx, wy); return; }
    if (sceneryTool === "river"){ return; }
    placeSceneryAt(wx, wy);
    return;
  }
  if (buildMode){
    if (buildTool === "erase"){ eraseAt(wx, wy); return; }
    if (buildTool === "station"){ stationAt(wx, wy); return; }
    if (buildTool === "join"){ joinTapAt(wx, wy); return; }
    const swn0 = switchNodeAt(sx, sy);
    if (swn0) toggleSwitch(swn0);
    return;
  }
  const swn = switchNodeAt(sx, sy);
  if (swn){ toggleSwitch(swn); return; }
  const t = trainAt(wx, wy);
  const now = performance.now() / 1000;
  if (t){
    const isDbl = (now - lastTapInfo.t < 0.42) && lastTapInfo.trainId === t.id && dist(sx, sy, lastTapInfo.x, lastTapInfo.y) < 46;
    lastTapInfo = { t: now, x: sx, y: sy, trainId: t.id };
    if (isDbl){ toggleRun(t); return; }
    selectTrain(t);
    return;
  }
  const isDblEmpty = (now - lastTapInfo.t < 0.42) && !lastTapInfo.trainId && dist(sx, sy, lastTapInfo.x, lastTapInfo.y) < 46;
  lastTapInfo = { t: now, x: sx, y: sy, trainId: 0 };
  if (isDblEmpty){
    startZoomAnim(Math.min(2.6, cam.z * 1.5), wx, wy);
    return;
  }

  ui.settingsPanel.classList.remove("show");
  ui.colorPicker.classList.remove("show");
}
function startZoomAnim(toZ, wx, wy){

function updateZoomAnim(dt){

  if (!za) return;
  za.t = Math.min(1, za.t + dt * 3);
  const k = za.t * za.t * (3 - 2 * za.t);
  const [sx, sy] = proj(za.wx, za.wy);
  cam.z = lerp(za.from, za.to, k);
  const [wx1, wy1] = unproj(sx, sy);
  cam.x += za.wx - wx1; cam.y += za.wy - wy1;
  if (za.t >= 1) cam.zoomAnim = null;
}
function drawDragGhost(){

  const tp = nearestTrackPoint(dragGhost.x, dragGhost.y, 70);

    const pt = lutAt(tp.seg, tp.s);
    const [tx, ty] = proj(pt.x, pt.y);
    ctx.strokeStyle = "rgba(80,220,90,.9)";

  }

  ctx.globalAlpha = 0.75;
  ctx.fillStyle = col.c;
  rrectPath(ctx, sx - 24 * cam.z, sy - 9 * cam.z, 48 * cam.z, 18 * cam.z, 7 * cam.z);
  ctx.fill();
  ctx.strokeStyle = col.d; ctx.lineWidth = 2;
  rrectPath(ctx, sx - 24 * cam.z, sy - 9 * cam.z, 48 * cam.z, 18 * cam.z, 7 * cam.z);
  ctx.stroke();
  ctx.globalAlpha = 1;
}
function onWheel(e){
  e.preventDefault();
  if (viewMode !== "aerial") return;
  const [sx, sy] = canvasPos(e);
  const [wx0, wy0] = unproj(sx, sy);

/* ---------------- botón mantener pulsado ---------------- */
function setupHold(btn, ms, cb){
  let timer = 0, start = 0, raf = 0;
  const fill = btn.querySelector(".fill");
  const tick = () => {
    const k = clamp((performance.now() - start) / ms, 0, 1);
    if (fill) fill.style.width = (k * 100) + "%";
    if (k < 1) raf = requestAnimationFrame(tick);
  };
  const cancel = () => {
    clearTimeout(timer); cancelAnimationFrame(raf);
    if (fill) fill.style.width = "0%";
  };
  btn.addEventListener("pointerdown", e => {
    e.preventDefault();
    start = performance.now();
    raf = requestAnimationFrame(tick);
    timer = setTimeout(() => { cancel(); cb(); }, ms);
  });
  btn.addEventListener("pointerup", cancel);
  btn.addEventListener("pointerleave", cancel);
  btn.addEventListener("pointercancel", cancel);
}

  ui.scSheep.addEventListener("click", () => setSceneryTool("sheep"));
  ui.scPerson.addEventListener("click", () => setSceneryTool("person"));
  ui.scLake.addEventListener("click", () => setSceneryTool("lake"));
  ui.scMountain.addEventListener("click", () => setSceneryTool("mountain"));
  ui.scRiver.addEventListener("click", () => setSceneryTool("river"));
  ui.scErase.addEventListener("click", () => setSceneryTool("erase"));
  // panel de tren
  ui.tpPlay.addEventListener("click", () => { if (selectedTrain) toggleRun(selectedTrain); });
  ui.tpReverse.addEventListener("click", () => {
    const t = selectedTrain;
    if (!t) return;
    if (t.speed > 2){ Snd.deny(); return; }
    reverseTrain(t);
    Snd.clack();
    const hp = trainPosAt(t, t.headS);
    for (let i = 0; i < 4; i++) spawnSteam(hp.x + rand(-8, 8), hp.y + rand(-6, 4));
  });
  ui.tpSpeed.addEventListener("input", () => {
    if (selectedTrain) selectedTrain.slider = ui.tpSpeed.value / 100;
  });
  ui.tpAddWagon.addEventListener("click", () => {
    const t = selectedTrain;
    if (!t || t.wagons.length >= MAX_WAGONS){ Snd.deny(); return; }
    t.wagons.push(WAGON_TYPES[t.wagons.length % WAGON_TYPES.length]);
    ensureBack(t);
    const tp = trainPosAt(t, t.headS - trainLength(t) + WAGON_LEN / 2);
    for (let i = 0; i < 5; i++) spawnSteam(tp.x + rand(-8, 8), tp.y + rand(-6, 4));
    if (t.wagons.length >= MAX_WAGONS) achieve("tren_largo");
    Snd.pop();
    updateTrainPanel();
    saveSoon();
  });
  ui.tpDelWagon.addEventListener("click", () => {
    const t = selectedTrain;
    if (!t || !t.wagons.length){ Snd.deny(); return; }
    const tp = trainPosAt(t, t.headS - trainLength(t) + WAGON_LEN / 2);
    t.wagons.pop();
    for (let i = 0; i < 4; i++) spawnSteam(tp.x + rand(-8, 8), tp.y + rand(-6, 4));
    Snd.pop();
    updateTrainPanel();
    saveSoon();
  });
  ui.tpFollow.addEventListener("click", () => {
    const t = selectedTrain;
    if (!t) return;
    cam.follow = cam.follow === t.id ? 0 : t.id;
    Snd.pop();
    updateTrainPanel();
  });
  ui.tpCab.addEventListener("click", () => { if (selectedTrain) enterCab(selectedTrain); });
  setupHold(ui.tpDelete, 900, () => {
    const t = selectedTrain;
    if (!t) return;
    const hp = trainPosAt(t, t.headS - trainLength(t) / 2);
    for (let i = 0; i < 10; i++) spawnSteam(hp.x + rand(-20, 20), hp.y + rand(-10, 10));
    removeTrain(t);
    Snd.pop();
    saveSoon();
  });
  // cabina
  ui.btnBackMap.addEventListener("click", exitCab);
  ui.btnHorn.addEventListener("click", hornBlast);
  ui.cabSpeedRange.addEventListener("input", () => {
    if (cabTrain) cabTrain.slider = ui.cabSpeedRange.value / 100;
  });
  ui.btnCabStop.addEventListener("click", () => { if (cabTrain) toggleRun(cabTrain); });
  // esquina superior derecha
  ui.btnSound.addEventListener("click", () => {
    firstGesture();
    Snd.setMuted(!Snd.muted);
    ui.btnSound.textContent = Snd.muted ? "🔇" : "🔊";
    saveSoon();
  });
  if (document.documentElement.requestFullscreen){
    ui.btnFull.addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
      else document.exitFullscreen().catch(() => {});
      Snd.pop();
    });
  } else ui.btnFull.style.display = "none";
  ui.btnSettings.addEventListener("click", () => {
    ui.settingsPanel.classList.toggle("show");
    ui.colorPicker.classList.remove("show");
    Snd.pop();
  });
  ui.stTutorial.addEventListener("click", () => {
    ui.settingsPanel.classList.remove("show");
    if (buildMode) setBuildMode(false);
    if (viewMode === "cab") exitCab();
    startOnboarding(true);
    Snd.pop();
  });
  setupHold(ui.stReset, 1100, () => {
    resetting = true;
    try { localStorage.removeItem(SAVE_KEY); } catch(e){}
    location.reload();
  });
  ui.bubbleSkip.addEventListener("click", skipOnboarding);
  // gestos del lienzo
  canvas.addEventListener("pointerdown", onPointerDown);
  canvas.addEventListener("pointermove", onPointerMove);
  canvas.addEventListener("pointerup", onPointerUp);
  canvas.addEventListener("pointercancel", onPointerUp);
  canvas.addEventListener("wheel", onWheel, { passive: false });
  document.addEventListener("pointerdown", firstGesture, { capture: true });
  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("gesturestart", e => e.preventDefault());
}
/* ============================================================
   PERSISTENCIA — localStorage
   ============================================================ */
let saveTimer = 4;
function saveSoon(){ saveTimer = Math.min(saveTimer, 0.8); }
function serialize(){
  const tArr = [];
  for (const t of trains){
    let idx = t.route.length - 1;
    while (idx > 0 && t.cum[idx] > t.headS) idx--;
    const rec = t.route[idx];
    if (!segs.has(rec.seg)) continue;
    tArr.push({
      color: t.color, wagons: t.wagons, seg: rec.seg, dir: rec.dir,
      local: +(t.headS - t.cum[idx]).toFixed(2), slider: +t.slider.toFixed(2)
    });
  }
  return {
    v: 1, nid, sid, stationId, trainId,
    nodes: [...nodes.values()].map(n => [n.id, +n.x.toFixed(2), +n.y.toFixed(2)]),
    segs: [...segs.values()].map(s => [s.id, s.a, s.b, +s.c[0].toFixed(2), +s.c[1].toFixed(2), +s.c[2].toFixed(2), +s.c[3].toFixed(2)]),
    stations: [...stationsMap.values()].map(st => [st.id, st.seg, +st.s.toFixed(2)]),
    switches: [...switches.entries()].map(([nId, sw]) => [nId, sw.active]),
    trains: tArr,
    medalTime: Math.floor(medalTime),
    ach: achievementsDone,
    obDone: onboarding.done,
    muted: Snd.muted,
    cam: { x: Math.round(cam.x), y: Math.round(cam.y), z: +cam.z.toFixed(2) },
    buildCount,
    userDecor: userDecor.map(d => [d.type, Math.round(d.x), Math.round(d.y), +(+d.v).toFixed(3), +(+d.s).toFixed(2)]),
    userRivers: userRivers.map(rv => rv.map(p => [Math.round(p[0]), Math.round(p[1])]))
  };
}
function saveGame(){
  if (resetting) return;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(serialize())); } catch(e){}
}
function deserialize(d){
  if (!d || d.v !== 1 || !Array.isArray(d.nodes) || !Array.isArray(d.segs)) return false;
  nodes = new Map(); segs = new Map(); stationsMap = new Map(); switches = new Map(); trains = [];
  for (const nd of d.nodes){
    if (!Array.isArray(nd) || nd.length < 3) continue;
    nodes.set(nd[0], { id: nd[0], x: nd[1], y: nd[2], segs: [] });
  }
  for (const sd of d.segs){
    if (!Array.isArray(sd) || sd.length < 7) continue;
    const [id, a, b, c1x, c1y, c2x, c2y] = sd;
    if (!nodes.has(a) || !nodes.has(b)) continue;
    const s = { id, a, b, c: [c1x, c1y, c2x, c2y], bridges: [], stations: [] };
    segs.set(id, s);
    nodes.get(a).segs.push(id);
    nodes.get(b).segs.push(id);
    buildLUT(s);
    computeWaterSpans(s);
  }
  for (const n of [...nodes.values()]) if (!n.segs.length) nodes.delete(n.id);
  if (!segs.size) return false;
  for (const n of nodes.values()) refreshSwitchAt(n.id);
  if (Array.isArray(d.switches)){
    for (const [nId, act] of d.switches){
      const sw = switches.get(nId);
      if (sw && sw.options.includes(act)) sw.active = act;
    }
  }
  if (Array.isArray(d.stations)){
    for (const [id, segId, s] of d.stations){
      const sg = segs.get(segId);
      if (!sg) continue;
      const sc = clamp(s, 0, sg.len);
      const p = lutAt(sg, sc);
      stationsMap.set(id, { id, seg: segId, s: sc, x: p.x, y: p.y, tx: p.tx, ty: p.ty });
      sg.stations.push(id);
    }
  }
  nid = Math.max(d.nid || 1, ...[...nodes.keys()], 1) + 1;
  sid = Math.max(d.sid || 1, ...[...segs.keys()], 1) + 1;
  stationId = Math.max(d.stationId || 1, ...[...stationsMap.keys()], 1) + 1;
  recomputeTunnelMouths();
  if (Array.isArray(d.trains)){
    for (const td of d.trains){
      if (!td || !segs.has(td.seg) || trains.length >= MAX_TRAINS) continue;
      const wag = Array.isArray(td.wagons) ? td.wagons.filter(w => WAGON_TYPES.includes(w)) : [];
      const t = makeTrain(td.color || 0, td.seg, td.dir === -1 ? -1 : 1, td.local || 50, wag);
      t.slider = clamp(td.slider === undefined ? 0.5 : td.slider, 0, 1);
    }
  }
  trainId = Math.max(d.trainId || 1, ...trains.map(t => t.id), 1) + 1;
  medalTime = d.medalTime || 0;
  achievementsDone = d.ach && typeof d.ach === "object" ? d.ach : {};
  onboarding.done = !!d.obDone;
  Snd.muted = !!d.muted;
  buildCount = d.buildCount || 0;
  // decoración y ríos del jugador
  userDecor = [];
  const OKTYPES = { tree:1, pine:1, house:1, cow:1, sheep:1, person:1, lake:1, mountain:1, bush:1 };
  if (Array.isArray(d.userDecor)){
    for (const it of d.userDecor){
      if (!Array.isArray(it) || it.length < 5) continue;
      const [type, x, y, v, s] = it;
      if (!OKTYPES[type]) continue;
      userDecor.push({ type, x: +x, y: +y, v: +v, s: +s || 1, user: 1 });
    }
  }
  userRivers = [];
  if (Array.isArray(d.userRivers)){
    for (const rv of d.userRivers){
      if (Array.isArray(rv) && rv.length > 1){
        userRivers.push(rv.filter(p => Array.isArray(p) && p.length >= 2).map(p => [+p[0], +p[1]]));
      }
    }
  }
  if (d.cam){
    cam.x = clamp(d.cam.x, -250, WORLD.w + 250);
    cam.y = clamp(d.cam.y, -250, WORLD.h + 250);
    cam.z = clamp(d.cam.z || 0.9, 0.42, 2.6);
  }
  firstSwitchNode = switches.size ? [...switches.keys()][0] : 0;
  return true;
}
/* ============================================================
   BUCLE PRINCIPAL
   ============================================================ */
let lastTs = 0, frameEma = 16, qualityCooldown = 3;
function update(dt){
  Snd.updateMusic();
  updateZoomAnim(dt);
  if (cam.follow){
    const t = trains.find(tt => tt.id === cam.follow);
    if (t){
      const hp = trainPosAt(t, t.headS);
      const k = Math.min(1, dt * 3.2);
      cam.x = lerp(cam.x, hp.x, k);
      cam.y = lerp(cam.y, hp.y, k);
    } else cam.follow = 0;
  }
  buildSpans();
  for (const t of trains) updateTrain(t, dt);
  buildSpans();
  checkCollisions();
  updateParticles(dt);
  updateAmbient(dt);
  const anyMoving = trains.some(t => t.speed > 10);
  if (anyMoving) medalTime += dt;
  if (medalTime >= 300) achieve("seguro");
  medalUiT -= dt;
  if (medalUiT <= 0){ medalUiT = 0.25; updateMedalUI(); }
  positionTrainPanel();
  onboardingTick();
  saveTimer -= dt;
  if (saveTimer <= 0){ saveTimer = 4; saveGame(); }
  qualityCooldown -= dt;
  if (qualityCooldown <= 0){
    if (frameEma > 27 && quality > 0){ quality--; qualityCooldown = 5; }
    else if (frameEma < 15 && quality < 2){ quality++; qualityCooldown = 8; }
    else qualityCooldown = 1;
  }
}
function frame(ts){
  requestAnimationFrame(frame);
  if (!lastTs) lastTs = ts;
  let dtMs = ts - lastTs;
  lastTs = ts;
  frameEma = frameEma * 0.94 + Math.min(dtMs, 60) * 0.06;
  const dt = clamp(dtMs / 1000, 0, 0.05);
  gameTime += dt;
  update(dt);
  if (viewMode === "aerial"){
    renderAerial();
    drawDragGhost();
  } else {
    renderCab(dt);
  }
  drawScreenParticles();
}
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  fxCanvas.width = Math.round(W * DPR);
  fxCanvas.height = Math.round(H * DPR);
}
/* ============================================================
   ARRANQUE
   ============================================================ */
function init(){
  canvas = document.getElementById("game");
  ctx = canvas.getContext("2d");
  fxCanvas = document.getElementById("fx");
  fxCtx = fxCanvas.getContext("2d");
  initUI();
  resize();
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 250));
  buildTerrain();
  let loaded = false;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) loaded = deserialize(JSON.parse(raw));
  } catch(e){ loaded = false; }
  if (!loaded){
    nodes = new Map(); segs = new Map(); stationsMap = new Map(); switches = new Map(); trains = [];
    nid = 1; sid = 1; stationId = 1; trainId = 1;
    buildInitialTrack();
    const seg = segs.get(initialStationSegId);
    const st = [...stationsMap.values()][0];
    if (seg){
      const t = makeTrain(0, seg.id, 1, (st ? st.s : seg.len / 2) + LOCO_LEN / 2 + 8, ["pasajeros", "mercancias"]);
      t.lastStation = st ? st.id : 0;
    }
    cam.x = 1010; cam.y = 830; cam.z = 0.9;
  }
  buildScenery();
  recomputeTunnelMouths();
  ui.btnSound.textContent = Snd.muted ? "🔇" : "🔊";
  updateMedalUI();
  updateTrainPanel();
  // El tutorial NO arranca solo; solo se lanza desde Ajustes → "Ver tutorial".
  document.addEventListener("visibilitychange", () => {
    if (document.hidden){ saveGame(); Snd.suspend(); }
    else { Snd.resume(); }
    lastTs = 0;
  });
  window.addEventListener("pagehide", saveGame);
  requestAnimationFrame(frame);
}
init();
</script>
