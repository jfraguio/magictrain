<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Tren Mágico — simulador de trenes para niños">
<!-- ---- Pantalla completa al añadir a la pantalla de inicio (web app) ---- -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tren Mágico">
<meta name="theme-color" content="#79c86e">
<link id="manifestLink" rel="manifest">
<link id="appIcon" rel="apple-touch-icon">
<script>
// Manifest e icono incrustados (sin ficheros externos, funciona offline).
(function(){
  var icon =
    '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">'+
    '<rect width="512" height="512" fill="#79c86e"/>'+
    '<rect x="60" y="360" width="392" height="14" rx="7" fill="#8a5a2b"/>'+
    '<rect x="150" y="180" width="230" height="150" rx="24" fill="#e8433f"/>'+
    '<rect x="150" y="150" width="110" height="92" rx="20" fill="#c9302c"/>'+
    '<rect x="170" y="172" width="62" height="52" rx="10" fill="#bfe3ff"/>'+
    '<rect x="330" y="128" width="40" height="62" rx="8" fill="#3a2a20"/>'+
    '<circle cx="350" cy="108" r="26" fill="#fff" opacity="0.9"/>'+
    '<circle cx="392" cy="86" r="18" fill="#fff" opacity="0.8"/>'+
    '<circle cx="200" cy="345" r="34" fill="#333"/>'+
    '<circle cx="200" cy="345" r="14" fill="#ddd"/>'+
    '<circle cx="320" cy="345" r="34" fill="#333"/>'+
    '<circle cx="320" cy="345" r="14" fill="#ddd"/>'+
    '</svg>';
  var iconUri = 'data:image/svg+xml,' + encodeURIComponent(icon);
  var manifest = {
    name: "Tren Mágico",
    short_name: "Tren Mágico",
    description: "Simulador de trenes para niños",
    start_url: ".",
    scope: ".",
    display: "fullscreen",
    display_override: ["fullscreen", "standalone"],
    orientation: "landscape",
    background_color: "#79c86e",
    theme_color: "#79c86e",
    icons: [{ src: iconUri, sizes: "any", type: "image/svg+xml", purpose: "any maskable" }]
  };
  var mUri = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.getElementById("manifestLink").setAttribute("href", mUri);
  document.getElementById("appIcon").setAttribute("href", iconUri);
})();
</script>
<title>🚂 Tren Mágico</title>
<style>
  :root{
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px);
    --safe-r: env(safe-area-inset-right, 0px);
    --panel-bg:#fffdf5;
    --panel-border:#e8b45a;
    --ink:#4a3728;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; position:fixed; inset:0;
    background:#79c86e; touch-action:none; overscroll-behavior:none;
    -webkit-user-select:none; user-select:none; -webkit-touch-callout:none;
    font-family:-apple-system, "SF Pro Rounded", "Segoe UI", "Comic Sans MS", "Chalkboard SE", system-ui, sans-serif;
    color:var(--ink);
  }
  #game{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }
  #fx{ position:absolute; inset:0; width:100%; height:100%; display:block; pointer-events:none; }

  /* ---------- botones genéricos ---------- */
  .btn{
    pointer-events:auto; border:none; cursor:pointer;
    min-width:52px; min-height:52px; padding:6px 12px;
    border-radius:18px; background:var(--panel-bg);
    border:3px solid var(--panel-border);
    box-shadow:0 4px 0 rgba(120,80,20,.35), 0 6px 14px rgba(0,0,0,.18);
    font-size:26px; line-height:1; color:var(--ink);
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition:transform .08s ease, box-shadow .08s ease, background .15s;
    font-family:inherit; font-weight:700; letter-spacing:.3px;
  }
  .btn:active{ transform:translateY(3px) scale(.96); box-shadow:0 1px 0 rgba(120,80,20,.35); }
  .btn.on{ background:#ffe9a8; border-color:#e08b1d; }
  .btn.big{ min-width:64px; min-height:64px; font-size:32px; border-radius:22px; }
  .btn.danger{ border-color:#d9534f; }
  .btn:disabled{ opacity:.4; pointer-events:none; }
  .btn .lbl{ font-size:13px; font-weight:800; }

  /* ---------- esquinas ---------- */
  #topLeft{ position:absolute; top:calc(10px + var(--safe-t)); left:calc(10px + var(--safe-l)); display:flex; gap:8px; align-items:center; pointer-events:none; z-index:20; }
  #medal{
    pointer-events:none; background:rgba(255,253,245,.92); border:3px solid var(--panel-border);
    border-radius:18px; padding:6px 14px; display:flex; align-items:center; gap:8px;
    box-shadow:0 4px 10px rgba(0,0,0,.15); font-weight:800; font-size:18px;
  }
  #medal .ic{ font-size:24px; }
  #topRight{ position:absolute; top:calc(10px + var(--safe-t)); right:calc(10px + var(--safe-r)); display:flex; gap:10px; z-index:20; }

  /* ---------- barra inferior ---------- */
  #bottomBar{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(12px + var(--safe-b));
    display:flex; gap:14px; z-index:20; align-items:flex-end;
  }

  /* ---------- selector de color ---------- */
  #colorPicker{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(92px + var(--safe-b)); z-index:25;
    background:var(--panel-bg); border:3px solid var(--panel-border); border-radius:22px;
    padding:12px 14px; display:none; gap:12px; align-items:center;
    box-shadow:0 8px 24px rgba(0,0,0,.25);
    animation:pop .18s ease;
  }
  #colorPicker.show{ display:flex; }
  .colorDot{
    width:52px; height:52px; border-radius:50%; border:4px solid #fff; cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.3); pointer-events:auto;
    transition:transform .1s;
  }
  .colorDot:active{ transform:scale(.9); }

  /* ---------- panel modo obra ---------- */
  #buildPanel{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(92px + var(--safe-b)); z-index:25;
    background:var(--panel-bg); border:3px solid #e08b1d; border-radius:22px;
    padding:10px 12px; display:none; gap:10px; align-items:center;
    box-shadow:0 8px 24px rgba(0,0,0,.25); animation:pop .18s ease;
  }
  #buildPanel.show{ display:flex; }
  #buildBand{
    position:absolute; inset:0; pointer-events:none; z-index:15; display:none;
    border:6px dashed rgba(240,160,30,.85); border-radius:4px;
    box-shadow:inset 0 0 40px rgba(240,160,30,.25);
  }
  #buildBand.show{ display:block; }
  #buildHint{
    position:absolute; top:calc(64px + var(--safe-t)); left:50%; transform:translateX(-50%);
    background:rgba(255,240,200,.95); border:2px solid #e08b1d; color:#7a4d10;
    padding:6px 16px; border-radius:16px; font-weight:800; font-size:15px;
    pointer-events:none; z-index:16; display:none; text-align:center; max-width:88vw;
  }
  #buildHint.show{ display:block; }

  /* ---------- panel modo paisaje ---------- */
  #sceneryPanel{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:calc(92px + var(--safe-b)); z-index:25;
    background:var(--panel-bg); border:3px solid #37a84d; border-radius:22px;
    padding:10px 12px; display:none; gap:8px; align-items:center; flex-wrap:wrap;
    max-width:94vw; justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,.25); animation:pop .18s ease;
  }
  #sceneryPanel.show{ display:flex; }
  #sceneryPanel .btn{ min-width:48px; min-height:48px; font-size:23px; border-radius:14px; padding:4px 6px; }
  #sceneryBand{
    position:absolute; inset:0; pointer-events:none; z-index:15; display:none;
    border:6px dashed rgba(55,168,77,.85); border-radius:4px;
    box-shadow:inset 0 0 40px rgba(55,168,77,.25);
  }
  #sceneryBand.show{ display:block; }

  /* ---------- panel tren ---------- */
  #trainPanel{
    position:fixed; left:50%; transform:translateX(-50%);
    bottom:calc(88px + var(--safe-b)); z-index:22; display:none; flex-direction:column; gap:8px;
    background:var(--panel-bg); border:3px solid var(--panel-border); border-radius:20px;
    padding:10px; box-shadow:0 10px 26px rgba(0,0,0,.28); animation:pop .18s ease;
    width:238px;
  }
  #trainPanel.show{ display:flex; }
  #trainPanel .row{ display:flex; gap:8px; justify-content:center; align-items:center; }
  #trainPanel .btn{ min-width:46px; min-height:46px; font-size:22px; border-radius:14px; padding:4px 8px; }
  #tpName{ text-align:center; font-weight:900; font-size:15px; letter-spacing:.5px; }
  .sliderWrap{ display:flex; flex-direction:column; gap:2px; padding:0 4px; }
  .sliderIcons{ display:flex; justify-content:space-between; font-size:16px; padding:0 2px; }
  input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:34px; border-radius:17px;
    background:linear-gradient(90deg,#9be09b 0%, #ffe27a 50%, #ff9d76 100%);
    border:3px solid var(--panel-border); outline:none; pointer-events:auto;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; width:40px; height:40px; border-radius:50%;
    background:#fff; border:4px solid #e08b1d; box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer;
  }
  input[type=range]::-moz-range-thumb{
    width:38px; height:38px; border-radius:50%;
    background:#fff; border:4px solid #e08b1d; box-shadow:0 2px 6px rgba(0,0,0,.3); cursor:pointer;
  }

  /* ---------- UI cabina ---------- */
  #cabUI{ position:absolute; inset:0; z-index:30; display:none; pointer-events:none; }
  #cabUI.show{ display:block; }
  #btnBackMap{ position:absolute; top:calc(12px + var(--safe-t)); left:calc(12px + var(--safe-l)); }
  #btnHorn{
    position:absolute; right:calc(18px + var(--safe-r)); bottom:calc(120px + var(--safe-b));
    width:86px; height:86px; border-radius:50%; font-size:40px;
    background:#ffd94d; border-color:#d98a12;
  }
  #cabSpeed{
    position:absolute; left:calc(18px + var(--safe-l)); bottom:calc(28px + var(--safe-b));
    width:min(300px, 44vw); background:rgba(255,253,245,.9); border:3px solid var(--panel-border);
    border-radius:20px; padding:8px 12px; pointer-events:auto;
  }
  #btnCabStop{ position:absolute; right:calc(18px + var(--safe-r)); bottom:calc(28px + var(--safe-b)); }

  /* ---------- ajustes ---------- */
  #settingsPanel{
    position:absolute; top:calc(76px + var(--safe-t)); right:calc(12px + var(--safe-r)); z-index:26;
    background:var(--panel-bg); border:3px solid var(--panel-border); border-radius:20px;
    padding:12px; display:none; flex-direction:column; gap:10px; width:230px;
    box-shadow:0 10px 26px rgba(0,0,0,.28); animation:pop .18s ease;
  }
  #settingsPanel.show{ display:flex; }
  #settingsPanel .btn{ font-size:17px; justify-content:flex-start; }
  .holdBtn{ position:relative; overflow:hidden; }
  .holdBtn .fill{
    position:absolute; left:0; top:0; bottom:0; width:0%;
    background:rgba(217,83,79,.35); border-radius:14px; pointer-events:none;
  }

  /* ---------- toast logros ---------- */
  #toast{
    position:absolute; top:calc(70px + var(--safe-t)); left:50%; transform:translateX(-50%) scale(0);
    z-index:40; background:#fff8e1; border:4px solid #f2b705; border-radius:24px;
    padding:12px 22px; display:flex; align-items:center; gap:12px;
    box-shadow:0 12px 30px rgba(0,0,0,.3); pointer-events:none;
    transition:transform .3s cubic-bezier(.2,1.6,.4,1);
    font-size:18px; font-weight:900;
  }
  #toast.show{ transform:translateX(-50%) scale(1); }
  #toast .star{ font-size:34px; }

  /* ---------- onboarding ---------- */
  #bubble{
    position:absolute; z-index:45; background:#fff; border:4px solid #5aa9e6; border-radius:22px;
    padding:12px 18px; font-size:19px; font-weight:900; color:#20516e;
    box-shadow:0 10px 26px rgba(0,0,0,.3); display:none; max-width:280px; text-align:center;
    pointer-events:none; animation:pop .25s ease;
  }
  #bubble.show{ display:block; }
  #bubble .skip{ pointer-events:auto; position:absolute; top:-16px; right:-16px; width:36px; height:36px;
    border-radius:50%; background:#fff; border:3px solid #5aa9e6; font-size:16px; font-weight:900; color:#20516e;
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.25);
  }
  #hand{ position:absolute; z-index:46; font-size:44px; pointer-events:none; display:none;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.35)); }
  #hand.show{ display:block; animation:tapTap 1.1s ease-in-out infinite; }
  @keyframes tapTap{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-6px,-14px) scale(1.15); }
  }
  @keyframes pop{ 0%{ transform:scale(.6); opacity:0; } 100%{ transform:scale(1); opacity:1; } }
  #bubble.show.center{ animation:pop .25s ease; }

  .pulseGlow{ animation:pulseGlow 1.2s ease-in-out infinite; }
  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 4px 0 rgba(120,80,20,.35), 0 0 0 0 rgba(90,169,230,.8); }
    50%{ box-shadow:0 4px 0 rgba(120,80,20,.35), 0 0 0 14px rgba(90,169,230,0); }
  }
  @media (max-height:420px){
    .btn.big{ min-width:54px; min-height:54px; font-size:26px; }
    #trainPanel{ width:212px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="fx"></canvas>

<div id="buildBand"></div>
<div id="buildHint">Arrastra desde un punto brillante ✨ para crear vías</div>

<div id="topLeft">
  <div id="medal"><span class="ic" id="medalIcon">🕐</span><span id="medalTime">0:00</span></div>
</div>
<div id="topRight">
  <button class="btn" id="btnSound" title="Sonido">🔊</button>
  <button class="btn" id="btnFull" title="Pantalla completa">⛶</button>
  <button class="btn" id="btnSettings" title="Ajustes">⚙️</button>
</div>

<div id="bottomBar">
  <button class="btn big" id="btnNewTrain" title="Nuevo tren">➕🚂</button>
  <button class="btn big" id="btnBuild" title="Construir vías">🛤️</button>
  <button class="btn big" id="btnScenery" title="Editar paisaje">🌳</button>
</div>

<div id="colorPicker"></div>

<div id="buildPanel">
  <button class="btn" id="toolTrack" title="Trazar vía">✏️🛤️</button>
  <button class="btn" id="toolJoin" title="Unir extremos (cerrar circuito)">🔗</button>
  <button class="btn" id="toolErase" title="Borrar vía">🧽</button>
  <button class="btn" id="toolStation" title="Estación">🚉</button>
  <button class="btn" id="btnBuildDone" title="Terminar" style="background:#d3f2c8;border-color:#37b24d;">✔️</button>
</div>

<div id="sceneryBand"></div>
<div id="sceneryPanel">
  <button class="btn" id="scTree" title="Árbol">🌳</button>
  <button class="btn" id="scPine" title="Pino">🌲</button>
  <button class="btn" id="scHouse" title="Casa">🏠</button>
  <button class="btn" id="scCow" title="Vaca">🐄</button>
  <button class="btn" id="scSheep" title="Oveja">🐑</button>
  <button class="btn" id="scPerson" title="Persona">🚶</button>
  <button class="btn" id="scLake" title="Lago">🏞️</button>
  <button class="btn" id="scMountain" title="Montaña">⛰️</button>
  <button class="btn" id="scRiver" title="Dibujar río">🌊</button>
  <button class="btn" id="scErase" title="Borrar paisaje">🧽</button>
  <button class="btn" id="btnSceneryDone" title="Terminar" style="background:#d3f2c8;border-color:#37b24d;">✔️</button>
</div>

<div id="trainPanel">
  <div id="tpName">TREN</div>
  <div class="row">
    <button class="btn" id="tpPlay" title="Arrancar/Parar">▶️</button>
    <button class="btn" id="tpReverse" title="Cambiar sentido">🔄</button>
    <button class="btn" id="tpFollow" title="Seguir tren">🎯</button>
    <button class="btn" id="tpCab" title="Vista maquinista">👁️</button>
  </div>
  <div class="sliderWrap">
    <div class="sliderIcons"><span>🐢</span><span>🚶</span><span>🐇</span></div>
    <input type="range" id="tpSpeed" min="0" max="100" value="55">
  </div>
  <div class="row">
    <button class="btn" id="tpAddWagon" title="Añadir vagón">➕🚃</button>
    <button class="btn" id="tpDelWagon" title="Quitar vagón">➖🚃</button>
    <button class="btn danger holdBtn" id="tpDelete" title="Mantén pulsado para borrar">🗑️<div class="fill"></div></button>
  </div>
</div>

<div id="cabUI">
  <button class="btn big" id="btnBackMap" title="Volver al mapa">🗺️</button>
  <button class="btn" id="btnHorn" title="¡Bocina!">📯</button>
  <div id="cabSpeed">
    <div class="sliderIcons"><span>🐢</span><span>🚶</span><span>🐇</span></div>
    <input type="range" id="cabSpeedRange" min="0" max="100" value="55">
  </div>
  <button class="btn big" id="btnCabStop" title="Parar/Arrancar">⏸️</button>
</div>

<div id="settingsPanel">
  <button class="btn" id="stTutorial">💬 <span class="lbl">Ver tutorial</span></button>
  <button class="btn danger holdBtn" id="stReset">🧹 <span class="lbl">Empezar de nuevo (mantén)</span><div class="fill"></div></button>
  <div style="text-align:center;font-size:12px;opacity:.7;">Tren Mágico v1 · hecho con ❤️</div>
</div>

<div id="toast"><span class="star">⭐</span><span id="toastText">¡Logro!</span></div>
<div id="bubble"><span id="bubbleText"></span><div class="skip" id="bubbleSkip">✕</div></div>
<div id="hand">👆</div>

<script>
"use strict";
/* ============================================================
   🚂 TREN MÁGICO — juego completo en un solo fichero
   Secciones: utils · audio · vías · trenes · render · cabina ·
   construcción · entrada · UI · persistencia · bucle
   ============================================================ */

/* ---------------- utilidades ---------------- */
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
function angNorm(a){ while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; }
function rot(x, y, a){ const c = Math.cos(a), s = Math.sin(a); return [x * c - y * s, x * s + y * c]; }
// PRNG con semilla para decoración estable
function mulberry32(seed){ let t = seed >>> 0; return function(){ t += 0x6D2B79F5; let r = Math.imul(t ^ t >>> 15, 1 | t); r ^= r + Math.imul(r ^ r >>> 7, 61 | r); return ((r ^ r >>> 14) >>> 0) / 4294967296; }; }

/* ---------------- constantes del juego ---------------- */
const SQ = 0.62;                 // aplastado vertical 2.5D
const WORLD = { w: 4600, h: 3000 };   // espacio de construcción ampliado x4 en área
const MAX_TRAINS = 5, MAX_WAGONS = 8;
const LOCO_LEN = 46, WAGON_LEN = 36, CAR_GAP = 7;
const MAX_SPEED = 130;           // unidades/s
const RAIL_GAP = 13;             // separación raíles (mundo)
const TRAIN_COLORS = [
  { c: "#e23d3d", d: "#a02020", name: "ROJO" },
  { c: "#2f7fe0", d: "#1c56a0", name: "AZUL" },
  { c: "#37b24d", d: "#20732f", name: "VERDE" },
  { c: "#f2b705", d: "#b08205", name: "AMARILLO" },
  { c: "#8e5bd6", d: "#5f3a96", name: "MORADO" }
];
const WAGON_TYPES = ["pasajeros", "mercancias", "cisterna", "madera"];
const SAVE_KEY = "trenMagico_v1";
let resetting = false; // evita que se re-guarde el estado tras "Empezar de nuevo"

/* ---------------- estado global ---------------- */
let canvas, ctx, fxCanvas, fxCtx, W = 0, H = 0, DPR = 1;
let nodes = new Map(), segs = new Map(), stationsMap = new Map(), switches = new Map();
let nid = 1, sid = 1, stationId = 1, trainId = 1;
let trains = [];
let particles = [], screenParticles = [];
let decor = [], hills = [], clouds = [], birds = [];
let riverPath = [];              // polilínea del río
const RIVER_W = 64;
let cam = { x: 1050, y: 800, z: 0.9, follow: 0, zoomAnim: null };
let selectedTrain = null;
let viewMode = "aerial";         // aerial | cab
let buildMode = false, buildTool = "track";
let sceneryMode = false, sceneryTool = "tree";
let userDecor = [];          // decoración colocada por el jugador (persistida)
let userRivers = [];         // ríos dibujados por el jugador: [ [ [x,y],... ], ... ]
let riverDraw = null;        // río en construcción (array de puntos)
let medalTime = 0, buildCount = 0;
let quality = 2;                 // 2 alto, 1 medio, 0 bajo
let gameTime = 0;
let audioStarted = false;
let onboarding = { active: false, step: 0, done: false };
let achievementsDone = {};
let spansCache = new Map();      // segId -> [{train, lo, hi}]
let lastBellAt = -10;
let ui = {};                     // referencias DOM

/* ---------------- AUDIO (Web Audio, procedural) ---------------- */
const Snd = {
  ctx: null, master: null, musicGain: null, fxGain: null,
  muted: false, musicTimer: 0, nextNote: 0, slot: 0, melodyIdx: 2,
  init(){
    if (this.ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 1;
      this.master.connect(this.ctx.destination);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.14;
      this.musicGain.connect(this.master);
      this.fxGain = this.ctx.createGain();
      this.fxGain.gain.value = 0.5;
      this.fxGain.connect(this.master);
      this.nextNote = this.ctx.currentTime + 0.1;
      audioStarted = true;
    } catch(e){ /* sin audio */ }
  },
  resume(){ if (this.ctx && this.ctx.state === "suspended") this.ctx.resume().catch(()=>{}); },
  suspend(){ if (this.ctx && this.ctx.state === "running") this.ctx.suspend().catch(()=>{}); },
  setMuted(m){
    this.muted = m;
    if (this.master) this.master.gain.linearRampToValueAtTime(m ? 0 : 1, this.ctx.currentTime + 0.15);
  },
  // voz genérica
  tone(o){
    if (!this.ctx || this.muted) return;
    const t0 = o.at !== undefined ? o.at : this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    osc.type = o.type || "sine";
    osc.frequency.setValueAtTime(o.f, t0);
    if (o.glide) osc.frequency.exponentialRampToValueAtTime(Math.max(20, o.glide), t0 + (o.dur || 0.3));
    let node = osc;
    if (o.vib){
      const lfo = this.ctx.createOscillator(), lg = this.ctx.createGain();
      lfo.frequency.value = o.vib; lg.gain.value = o.vibAmt || o.f * 0.02;
      lfo.connect(lg); lg.connect(osc.frequency); lfo.start(t0); lfo.stop(t0 + (o.dur || 0.3) + 0.1);
    }
    if (o.lp){
      const f = this.ctx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = o.lp;
      node.connect(f); node = f;
    }
    const g = this.ctx.createGain();
    const v = o.vol || 0.2, atk = o.atk || 0.01, dur = o.dur || 0.3;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(v, t0 + atk);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    node.connect(g); g.connect(o.dest || this.fxGain);
    osc.start(t0); osc.stop(t0 + dur + 0.05);
  },
  noiseBurst(o){
    if (!this.ctx || this.muted) return;
    const t0 = o.at !== undefined ? o.at : this.ctx.currentTime;
    const dur = o.dur || 0.1;
    const len = Math.max(1, Math.floor(this.ctx.sampleRate * dur));
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter();
    f.type = o.hp ? "highpass" : "bandpass";
    f.frequency.value = o.freq || 1000; f.Q.value = o.q || 1;
    const g = this.ctx.createGain(); g.gain.value = o.vol || 0.2;
    src.connect(f); f.connect(g); g.connect(this.fxGain);
    src.start(t0);
  },
  pop(){ this.tone({ f: 620, glide: 880, type: "sine", dur: 0.09, vol: 0.25 }); },
  deny(){ this.tone({ f: 220, glide: 160, type: "square", dur: 0.15, vol: 0.08, lp: 900 }); },
  clack(){
    this.noiseBurst({ freq: 2400, q: 2, dur: 0.05, vol: 0.3 });
    this.noiseBurst({ freq: 1500, q: 2, dur: 0.06, vol: 0.25, at: this.ctx ? this.ctx.currentTime + 0.07 : 0 });
  },
  whistle(long){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime, dur = long ? 0.9 : 0.45;
    this.tone({ f: 587, type: "triangle", dur, vol: 0.22, vib: 6, vibAmt: 9, at: t });
    this.tone({ f: 740, type: "triangle", dur, vol: 0.18, vib: 6, vibAmt: 11, at: t });
    this.tone({ f: 880, type: "sine", dur: dur * 0.8, vol: 0.06, at: t });
    this.noiseBurst({ freq: 3000, q: 0.7, dur: dur * 0.7, vol: 0.05, at: t });
  },
  bell(){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    this.tone({ f: 1318, type: "sine", dur: 0.5, vol: 0.16, at: t });
    this.tone({ f: 1318 * 2.7, type: "sine", dur: 0.25, vol: 0.05, at: t });
    this.tone({ f: 1318, type: "sine", dur: 0.5, vol: 0.13, at: t + 0.32 });
  },
  boing(){
    this.tone({ f: 300, glide: 80, type: "square", dur: 0.4, vol: 0.14, lp: 1200 });
    this.tone({ f: 500, glide: 900, type: "sine", dur: 0.35, vol: 0.12, at: this.ctx ? this.ctx.currentTime + 0.05 : 0 });
  },
  bump(){ this.noiseBurst({ freq: 300, q: 1, dur: 0.12, vol: 0.25 }); },
  chuff(vol){ this.noiseBurst({ freq: 900, q: 0.8, dur: 0.08, vol: Math.min(0.1, vol) }); },
  fanfare(){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime, seq = [523, 659, 784, 1047];
    seq.forEach((f, i) => {
      this.tone({ f, type: "triangle", dur: 0.28, vol: 0.16, at: t + i * 0.11, lp: 3000 });
      this.tone({ f: f * 2, type: "sine", dur: 0.2, vol: 0.05, at: t + i * 0.11 });
    });
    this.tone({ f: 1047, type: "triangle", dur: 0.7, vol: 0.15, at: t + 0.5, lp: 3000 });
  },
  // música de fondo: cajita de música pentatónica
  PENTA: [261.63, 293.66, 329.63, 392.0, 440.0, 523.25, 587.33, 659.25, 784.0, 880.0],
  updateMusic(){
    if (!this.ctx || this.muted) return;
    const ahead = this.ctx.currentTime + 0.7;
    while (this.nextNote < ahead){
      const t = this.nextNote, slot = this.slot;
      // melodía: paseo aleatorio suave con silencios
      if (slot % 2 === 0 && Math.random() < 0.78){
        this.melodyIdx = clamp(this.melodyIdx + randi(-2, 2), 0, this.PENTA.length - 1);
        const f = this.PENTA[this.melodyIdx];
        this.tone({ f, type: "triangle", dur: 0.55, vol: 0.35, at: t, lp: 2200, dest: this.musicGain });
        this.tone({ f: f * 2.01, type: "sine", dur: 0.3, vol: 0.08, at: t, dest: this.musicGain });
      }
      if (slot % 8 === 0){ // bajo suave
        const f = this.PENTA[slot % 16 === 0 ? 0 : 3] / 2;
        this.tone({ f, type: "sine", dur: 1.4, vol: 0.3, at: t, dest: this.musicGain });
      }
      if (slot % 16 === 12 && Math.random() < 0.5){ // campanita
        this.tone({ f: pick(this.PENTA) * 2, type: "sine", dur: 0.8, vol: 0.1, at: t, dest: this.musicGain });
      }
      this.nextNote += 0.30;
      this.slot++;
    }
  }
};
/* ============================================================
   SISTEMA DE VÍAS — grafo de nodos + segmentos bezier cúbicos
   ============================================================ */
function addNode(x, y){
  const n = { id: nid++, x, y, segs: [] };
  nodes.set(n.id, n);
  return n;
}
function cubic(p0x, p0y, c1x, c1y, c2x, c2y, p3x, p3y, t){
  const u = 1 - t, uu = u * u, tt = t * t;
  const a = u * uu, b = 3 * uu * t, c = 3 * u * tt, d = t * tt;
  return [a * p0x + b * c1x + c * c2x + d * p3x, a * p0y + b * c1y + c * c2y + d * p3y];
}
function buildLUT(seg){
  const na = nodes.get(seg.a), nb = nodes.get(seg.b);
  const approx = dist(na.x, na.y, nb.x, nb.y) * 1.3 + 10;
  const N = clamp(Math.ceil(approx / 11), 8, 60);
  const px = [], py = [], cum = [0];
  for (let i = 0; i <= N; i++){
    const [x, y] = cubic(na.x, na.y, seg.c[0], seg.c[1], seg.c[2], seg.c[3], nb.x, nb.y, i / N);
    px.push(x); py.push(y);
    if (i > 0) cum.push(cum[i - 1] + dist(px[i - 1], py[i - 1], x, y));
  }
  seg.px = px; seg.py = py; seg.cum = cum; seg.len = cum[N];
  seg.paths = null; // caches de dibujo, se regeneran
}
// posición y tangente a distancia s (local 0..len, sentido a→b)
function lutAt(seg, s){
  s = clamp(s, 0, seg.len);
  const cum = seg.cum; let i = 1;
  while (i < cum.length - 1 && cum[i] < s) i++;
  const s0 = cum[i - 1], s1 = cum[i], t = s1 > s0 ? (s - s0) / (s1 - s0) : 0;
  const x = lerp(seg.px[i - 1], seg.px[i], t), y = lerp(seg.py[i - 1], seg.py[i], t);
  let tx = seg.px[i] - seg.px[i - 1], ty = seg.py[i] - seg.py[i - 1];
  const m = Math.hypot(tx, ty) || 1; tx /= m; ty /= m;
  return { x, y, tx, ty };
}
function outwardTangent(seg, nodeId){
  if (seg.a === nodeId){ const p = lutAt(seg, 0.5); return [p.tx, p.ty]; }
  const p = lutAt(seg, seg.len - 0.5); return [-p.tx, -p.ty];
}
function addSeg(aId, bId, c1x, c1y, c2x, c2y){
  const s = { id: sid++, a: aId, b: bId, c: [c1x, c1y, c2x, c2y], bridges: [], stations: [] };
  segs.set(s.id, s);
  nodes.get(aId).segs.push(s.id);
  nodes.get(bId).segs.push(s.id);
  buildLUT(s);
  computeWaterSpans(s);
  refreshSwitchAt(aId); refreshSwitchAt(bId);
  return s;
}
function addStraight(aId, bId){
  const na = nodes.get(aId), nb = nodes.get(bId);
  return addSeg(aId, bId, lerp(na.x, nb.x, 1/3), lerp(na.y, nb.y, 1/3), lerp(na.x, nb.x, 2/3), lerp(na.y, nb.y, 2/3));
}
// pieza de arco: desde pos con rumbo a (rad), giro delta (rad, + = horario), radio R
function arcPiece(x0, y0, a, delta, R){
  const dirx = Math.cos(a), diry = Math.sin(a);
  const s = Math.sign(delta) || 1;
  // centro = p0 + perp*R  (perp = dir rotado 90° hacia el lado del giro)
  const perpx = -Math.sin(a) * s, perpy = Math.cos(a) * s;
  const ccx = x0 + perpx * R, ccy = y0 + perpy * R;
  const [rx, ry] = rot(x0 - ccx, y0 - ccy, delta);
  const x3 = ccx + rx, y3 = ccy + ry;
  const a1 = a + delta;
  const k = (4 / 3) * Math.tan(Math.abs(delta) / 4) * R;
  return {
    p0: [x0, y0], p3: [x3, y3],
    c1: [x0 + dirx * k, y0 + diry * k],
    c2: [x3 - Math.cos(a1) * k, y3 - Math.sin(a1) * k],
    endA: a1
  };
}
function straightPiece(x0, y0, a, L){
  const dx = Math.cos(a), dy = Math.sin(a);
  const x3 = x0 + dx * L, y3 = y0 + dy * L;
  return { p0: [x0, y0], p3: [x3, y3], c1: [x0 + dx * L / 3, y0 + dy * L / 3], c2: [x0 + dx * L * 2/3, y0 + dy * L * 2/3], endA: a };
}
function removeSeg(id){
  const s = segs.get(id);
  if (!s) return;
  for (const stId of s.stations.slice()) stationsMap.delete(stId);
  s.stations.length = 0;
  for (const nId of [s.a, s.b]){
    const n = nodes.get(nId);
    if (!n) continue;
    const i = n.segs.indexOf(id);
    if (i >= 0) n.segs.splice(i, 1);
    if (n.segs.length === 0) nodes.delete(nId);
    else refreshSwitchAt(nId);
  }
  segs.delete(id);
  recomputeTunnelMouths();
}
/* ---------------- agujas (switches) ---------------- */
function refreshSwitchAt(nodeId){
  const n = nodes.get(nodeId);
  if (!n || n.segs.length < 3){ switches.delete(nodeId); return; }
  // buscar la entrada que ofrece 2+ salidas válidas (lado "punta" de la aguja)
  let best = null;
  for (const eId of n.segs){
    const eSeg = segs.get(eId);
    const [ox, oy] = outwardTangent(eSeg, nodeId);
    const dirx = -ox, diry = -oy; // dirección de viaje al entrar por eId
    const opts = [];
    for (const oId of n.segs){
      if (oId === eId) continue;
      const [tx, ty] = outwardTangent(segs.get(oId), nodeId);
      if (dirx * tx + diry * ty > 0.17) opts.push(oId);
    }
    if (opts.length >= 2 && (!best || opts.length > best.options.length)){
      best = { entry: eId, options: opts };
    }
  }
  if (!best){ switches.delete(nodeId); return; }
  const prev = switches.get(nodeId);
  const active = prev && best.options.includes(prev.active) ? prev.active : best.options[0];
  switches.set(nodeId, { entry: best.entry, options: best.options, active });
}
function toggleSwitch(nodeId){
  const sw = switches.get(nodeId);
  if (!sw) return false;
  const i = sw.options.indexOf(sw.active);
  sw.active = sw.options[(i + 1) % sw.options.length];
  sw.anim = 1; // animación palanca
  Snd.clack();
  onboardingEvent("switch");
  return true;
}
// siguiente traversal al llegar a un nodo con dirección de viaje (dirx,diry)
function nextTraversal(nodeId, dirx, diry, fromSegId){
  const n = nodes.get(nodeId);
  if (!n) return null;
  const cands = [];
  for (const sIdc of n.segs){
    if (sIdc === fromSegId) continue;
    const sg = segs.get(sIdc);
    const [tx, ty] = outwardTangent(sg, nodeId);
    const d = dirx * tx + diry * ty;
    if (d > 0.17) cands.push({ sg, d });
  }
  if (!cands.length) return null;
  let chosen = null;
  if (cands.length > 1){
    const sw = switches.get(nodeId);
    if (sw){ chosen = cands.find(c => c.sg.id === sw.active) || null; }
    if (!chosen){ cands.sort((a, b) => b.d - a.d); chosen = cands[0]; }
  } else chosen = cands[0];
  return { seg: chosen.sg, dir: chosen.sg.a === nodeId ? 1 : -1 };
}
/* ---------------- estaciones ---------------- */
function addStation(segId, s){
  const seg = segs.get(segId);
  if (!seg) return null;
  s = clamp(s, 25, seg.len - 25);
  const p = lutAt(seg, s);
  const st = { id: stationId++, seg: segId, s, x: p.x, y: p.y, tx: p.tx, ty: p.ty };
  stationsMap.set(st.id, st);
  seg.stations.push(st.id);
  return st;
}
/* ---------------- agua / puentes / túneles ---------------- */
function distToPolyline(x, y, pts){
  let best = 1e9;
  for (let i = 1; i < pts.length; i++){
    const ax = pts[i-1][0], ay = pts[i-1][1], bx = pts[i][0], by = pts[i][1];
    const dx = bx - ax, dy = by - ay, L2 = dx*dx + dy*dy || 1;
    const t = clamp(((x-ax)*dx + (y-ay)*dy) / L2, 0, 1);
    const d2 = dist2(x, y, ax + dx*t, ay + dy*t);
    if (d2 < best) best = d2;
  }
  return Math.sqrt(best);
}
function nearWater(x, y, pad){
  return distToPolyline(x, y, riverPath) < RIVER_W/2 + pad;
}
function computeWaterSpans(seg){
  seg.bridges = [];
  let inW = false, s0 = 0;
  const cum = seg.cum;
  for (let i = 0; i < seg.px.length; i++){
    const w = nearWater(seg.px[i], seg.py[i], 4);
    if (w && !inW){ inW = true; s0 = cum[i]; }
    if ((!w || i === seg.px.length - 1) && inW){
      inW = false;
      seg.bridges.push([Math.max(0, s0 - 16), Math.min(seg.len, cum[i] + 16)]);
    }
  }
}
function insideHill(x, y, h, f){
  const dx = (x - h.x) / (h.rx * f), dy = (y - h.y) / (h.ry * f);
  return dx*dx + dy*dy < 1;
}
function pointInAnyHill(x, y, f){
  for (const h of hills) if (insideHill(x, y, h, f)) return h;
  return null;
}
function recomputeTunnelMouths(){
  for (const h of hills){
    h.mouths = [];
    for (const seg of segs.values()){
      let was = false;
      for (let i = 0; i < seg.px.length; i++){
        const now = insideHill(seg.px[i], seg.py[i], h, 0.94);
        if (now !== was && i > 0){
          const p = lutAt(seg, (seg.cum[i-1] + seg.cum[i]) / 2);
          h.mouths.push({ x: p.x, y: p.y, tx: p.tx, ty: p.ty });
        }
        was = now;
      }
    }
  }
}
/* ---------------- búsquedas espaciales ---------------- */
function nearestTrackPoint(x, y, maxD){
  let best = null, bd = maxD * maxD;
  for (const seg of segs.values()){
    for (let i = 0; i < seg.px.length; i++){
      const d2 = dist2(x, y, seg.px[i], seg.py[i]);
      if (d2 < bd){ bd = d2; best = { seg, s: seg.cum[i], d: Math.sqrt(d2) }; }
    }
  }
  return best;
}
function nearestNode(x, y, maxD){
  let best = null, bd = maxD * maxD;
  for (const n of nodes.values()){
    const d2 = dist2(x, y, n.x, n.y);
    if (d2 < bd){ bd = d2; best = n; }
  }
  return best;
}
function openEnds(){
  const out = [];
  for (const n of nodes.values()) if (n.segs.length === 1) out.push(n);
  return out;
}

/* ============================================================
   MUNDO INICIAL — óvalo + apartadero con estación + paisaje
   ============================================================ */
let initialStationSegId = 0, firstSwitchNode = 0;
function buildInitialTrack(){
  // óvalo
  const yT = 520, yB = 880, xL = 700, xR = 1300, R = 180, K = R * 0.5523;
  const nTL = addNode(xL, yT), nTR = addNode(xR, yT);
  const nRm = addNode(xR + R, (yT + yB) / 2);
  const nBRc = addNode(xR, yB);
  const nS2 = addNode(1240, yB), nS1 = addNode(760, yB);
  const nBLc = addNode(xL, yB);
  const nLm = addNode(xL - R, (yT + yB) / 2);
  addStraight(nTL.id, nTR.id);
  addSeg(nTR.id, nRm.id, xR + K, yT, xR + R, (yT+yB)/2 - K);           // arco TR
  addSeg(nRm.id, nBRc.id, xR + R, (yT+yB)/2 + K, xR + K, yB);          // arco BR
  addStraight(nBRc.id, nS2.id);
  addStraight(nS2.id, nS1.id);
  addStraight(nS1.id, nBLc.id);
  addSeg(nBLc.id, nLm.id, xL - K, yB, xL - R, (yT+yB)/2 + K);          // arco BL
  addSeg(nLm.id, nTL.id, xL - R, (yT+yB)/2 - K, xL - K, yT);           // arco TL
  // apartadero (vía de paso) bajo la recta inferior
  const Rb = 100;
  const a1 = arcPiece(nS1.x, nS1.y, 0, Math.PI/4, Rb);
  const nA = addNode(a1.p3[0], a1.p3[1]);
  addSeg(nS1.id, nA.id, a1.c1[0], a1.c1[1], a1.c2[0], a1.c2[1]);
  const a2 = arcPiece(nA.x, nA.y, a1.endA, -Math.PI/4, Rb);
  const nB = addNode(a2.p3[0], a2.p3[1]);
  addSeg(nA.id, nB.id, a2.c1[0], a2.c1[1], a2.c2[0], a2.c2[1]);
  const b1 = arcPiece(nS2.x, nS2.y, Math.PI, -Math.PI/4, Rb);
  const nC = addNode(b1.p3[0], b1.p3[1]);
  addSeg(nS2.id, nC.id, b1.c1[0], b1.c1[1], b1.c2[0], b1.c2[1]);
  const b2 = arcPiece(nC.x, nC.y, b1.endA, Math.PI/4, Rb);
  const nD = addNode(b2.p3[0], b2.p3[1]);
  addSeg(nC.id, nD.id, b2.c1[0], b2.c1[1], b2.c2[0], b2.c2[1]);
  const loop = addStraight(nB.id, nD.id); // recta del apartadero
  initialStationSegId = loop.id;
  addStation(loop.id, loop.len / 2);
  firstSwitchNode = nS1.id;
  // espolón hacia el río: deja un extremo libre para invitar a construir
  const e1 = arcPiece(nBRc.x, nBRc.y, 0, Math.PI/4, 110);
  const nE1 = addNode(e1.p3[0], e1.p3[1]);
  addSeg(nBRc.id, nE1.id, e1.c1[0], e1.c1[1], e1.c2[0], e1.c2[1]);
  const e2 = arcPiece(nE1.x, nE1.y, e1.endA, -Math.PI/4, 110);
  const nE2 = addNode(e2.p3[0], e2.p3[1]);
  addSeg(nE1.id, nE2.id, e2.c1[0], e2.c1[1], e2.c2[0], e2.c2[1]);
  const e3 = straightPiece(nE2.x, nE2.y, e2.endA, 120);
  const nE3 = addNode(e3.p3[0], e3.p3[1]);
  addSeg(nE2.id, nE3.id, e3.c1[0], e3.c1[1], e3.c2[0], e3.c2[1]);
  // aguja S1: por defecto hacia el apartadero (el tren vuelve a casa)
  const sw = switches.get(nS1.id);
  if (sw){

    t.wait -= dt;

  }
  const canRun = t.running && t.stun <= 0 && t.wait <= 0;
  let target = canRun ? lerp(24, MAX_SPEED, t.slider) : 0;

        }

    }

  }

    t.headS += t.speed * dt;

    while (t.headS > t.total && guard++ < 12){

      if (!sg){ t.headS = t.total; break; }

      const p = rec.dir === 1 ? lutAt(sg, sg.len - 0.5) : lutAt(sg, 0.5);
      const fx = rec.dir === 1 ? p.tx : -p.tx, fy = rec.dir === 1 ? p.ty : -p.ty;

function buildSpans(){

    for (let i = 0; i < t.route.length; i++){
      const rec = t.route[i], sg = segs.get(rec.seg);
      if (!sg) continue;
      const lo = t.cum[i], hi = lo + sg.len;
      const o0 = Math.max(lo, tail), o1 = Math.min(hi, t.headS);
      if (o1 <= o0) continue;
      const u0 = o0 - lo, u1 = o1 - lo;
      const sLo = rec.dir === 1 ? u0 : sg.len - u1;
      const sHi = rec.dir === 1 ? u1 : sg.len - u0;
      let arr = spansCache.get(sg.id);
      if (!arr){ arr = []; spansCache.set(sg.id, arr); }

/* ---------------- terreno ---------------- */
function strokeRiverPolyline(pts, w, vr, preview){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  const path = new Path2D();
  path.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++){
    const a = pts[i - 1], b = pts[i];
    path.quadraticCurveTo(a[0], a[1], (a[0] + b[0]) / 2, (a[1] + b[1]) / 2);
  }
  if (preview) ctx.globalAlpha = 0.7;
  ctx.strokeStyle = "#5f9e53"; ctx.lineWidth = w + 14; ctx.stroke(path);   // orilla
  ctx.strokeStyle = "#d9c9a0"; ctx.lineWidth = w + 6; ctx.stroke(path);    // arena
  ctx.strokeStyle = "#63b7e6"; ctx.lineWidth = w; ctx.stroke(path);        // agua
  ctx.strokeStyle = "#8fd0f0"; ctx.lineWidth = w * 0.55; ctx.stroke(path); // agua clara
  // destellos que fluyen
  ctx.fillStyle = "rgba(255,255,255,.8)";
  const flow = (gameTime * 40) % 90;
  for (let i = 1; i < pts.length; i++){
    const a = pts[i - 1], b = pts[i];
    for (let k = flow; k < 110; k += 90){
      const t = k / 110;
      const x = lerp(a[0], b[0], t) + Math.sin(i * 3 + gameTime) * 8;
      const y = lerp(a[1], b[1], t);
      if (vr && (x < vr.x0 || x > vr.x1 || y < vr.y0 || y > vr.y1)) continue;
      ctx.fillRect(x - 4, y, 8, 2);
    }
  }
  if (preview) ctx.globalAlpha = 1;
}
function drawTerrain(vr){
  // hierba base con gradiente
  const g = ctx.createLinearGradient(0, 0, 0, WORLD.h);
  g.addColorStop(0, "#8ed07f"); g.addColorStop(1, "#6fbc60");
  ctx.fillStyle = g;
  ctx.fillRect(vr.x0, vr.y0, vr.x1 - vr.x0, vr.y1 - vr.y0);
  // parches
  for (const b of terrainBlobs){
    if (b.x + b.r < vr.x0 || b.x - b.r > vr.x1 || b.y + b.r < vr.y0 || b.y - b.r > vr.y1) continue;
    ctx.fillStyle = b.tone < 0.5 ? "rgba(255,255,220,0.10)" : "rgba(40,120,50,0.10)";
    ctx.beginPath(); ctx.ellipse(b.x, b.y, b.r, b.r * 0.7, 0, 0, TAU); ctx.fill();

  // sombras de las nubes sobre el prado
  ctx.fillStyle = "rgba(20,55,30,.10)";
  for (const c of clouds){
    const cx2 = c.x - 26, cy2 = c.y + 46;
    if (cx2 + 120 < vr.x0 || cx2 - 120 > vr.x1 || cy2 + 60 < vr.y0 || cy2 - 60 > vr.y1) continue;
    ctx.beginPath();
    ctx.ellipse(cx2, cy2, 66 * c.s, 24 * c.s, 0, 0, TAU);

    ctx.ellipse(cx2 + 34 * c.s, cy2 + 4 * c.s, 42 * c.s, 18 * c.s, 0, 0, TAU);
    ctx.fill();
  }
  // caminos de tierra fijos
  ctx.strokeStyle = "#cbb489"; ctx.lineCap = "round"; ctx.lineWidth = 16;
  ctx.beginPath(); ctx.moveTo(1530, 470); ctx.quadraticCurveTo(1350, 700, 1090, 940);
  ctx.quadraticCurveTo(880, 1090, 660, 1170); ctx.stroke();
  ctx.strokeStyle = "rgba(140,110,60,.35)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(1530, 470); ctx.quadraticCurveTo(1350, 700, 1090, 940);
  ctx.quadraticCurveTo(880, 1090, 660, 1170); ctx.stroke();
  // lago
  for (const d of decor){
    if (d.type !== "lake") continue;
    ctx.fillStyle = "#7ec3e8";
    ctx.beginPath(); ctx.ellipse(d.x, d.y, 120, 78, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#a9dbF5";
    ctx.beginPath(); ctx.ellipse(d.x - 14, d.y - 10, 92, 56, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#8ecdec";
    ctx.beginPath(); ctx.ellipse(d.x - 14, d.y - 10, 78, 46, 0, 0, TAU); ctx.fill();
    // destellos
    ctx.fillStyle = "rgba(255,255,255,.75)";
    for (let i = 0; i < 4; i++){
      const a = gameTime * 0.7 + i * 1.7;
      const sx = d.x - 20 + Math.cos(a) * 40, sy = d.y - 8 + Math.sin(a * 1.3) * 22;
      ctx.fillRect(sx, sy, 7 + Math.sin(a * 2) * 2, 1.6);
    }
    ctx.fillStyle = "#5aa9e6";
    ctx.beginPath(); ctx.ellipse(d.x + 40, d.y + 26, 10, 5, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#7cc86f";
    ctx.beginPath(); ctx.ellipse(d.x + 40, d.y + 26, 5, 2.4, 0, 0, TAU); ctx.fill();
  }
  // río
  if (riverPath.length > 1){
    strokeRiverPolyline(riverPath, RIVER_W, vr);
  }
  // ríos dibujados por el jugador
  for (const rv of userRivers){
    if (rv.length > 1) strokeRiverPolyline(rv, RIVER_W * 0.8, vr);
  }
  // río en construcción (vista previa)
  if (riverDraw && riverDraw.length > 1) strokeRiverPolyline(riverDraw, RIVER_W * 0.8, vr, true);
  // flores (solo con zoom cercano)
  if (cam.z > 0.55){
    for (const d of decor){
      if (d.type !== "flower") continue;
      if (d.x < vr.x0 || d.x > vr.x1 || d.y < vr.y0 || d.y > vr.y1) continue;
      const cols = ["#ff7d9c", "#ffd166", "#f0f0ff", "#ff9a5c"];
      ctx.fillStyle = cols[Math.floor(d.v * cols.length) % cols.length];
      ctx.beginPath(); ctx.arc(d.x, d.y, 3.4, 0, TAU); ctx.fill();
      ctx.fillStyle = "#fff8d0";
      ctx.beginPath(); ctx.arc(d.x, d.y, 1.4, 0, TAU); ctx.fill();
    }
  }
}
/* ---------------- vías ---------------- */
function buildSegPaths(seg){
  const bal = new Path2D(), ties = new Path2D(), rL = new Path2D(), rR = new Path2D();
  const n = seg.px.length;
  bal.moveTo(seg.px[0], seg.py[0]);
  for (let i = 1; i < n; i++) bal.lineTo(seg.px[i], seg.py[i]);
  // raíles desplazados por la normal
  const off = RAIL_GAP / 2;
  let first = true;
  for (let i = 0; i < n; i++){
    const i0 = Math.max(0, i - 1), i1 = Math.min(n - 1, i + 1);
    let tx = seg.px[i1] - seg.px[i0], ty = seg.py[i1] - seg.py[i0];
    const m = Math.hypot(tx, ty) || 1; tx /= m; ty /= m;
    const nx = -ty, ny = tx;
    if (first){ rL.moveTo(seg.px[i] + nx * off, seg.py[i] + ny * off); rR.moveTo(seg.px[i] - nx * off, seg.py[i] - ny * off); first = false; }
    else { rL.lineTo(seg.px[i] + nx * off, seg.py[i] + ny * off); rR.lineTo(seg.px[i] - nx * off, seg.py[i] - ny * off); }
  }
  // traviesas
  for (let s = 5; s < seg.len - 3; s += 9.5){
    const p = lutAt(seg, s);
    const nx = -p.ty, ny = p.tx, e = off + 3.5;
    ties.moveTo(p.x + nx * e, p.y + ny * e);
    ties.lineTo(p.x - nx * e, p.y - ny * e);
  }
  seg.paths = { bal, ties, rL, rR };
}
function segInView(seg, vr){
  const na = nodes.get(seg.a), nb = nodes.get(seg.b);
  const x0 = Math.min(na.x, nb.x) - 200, x1 = Math.max(na.x, nb.x) + 200;
  const y0 = Math.min(na.y, nb.y) - 200, y1 = Math.max(na.y, nb.y) + 200;
  return x1 > vr.x0 && x0 < vr.x1 && y1 > vr.y0 && y0 < vr.y1;
}
function drawTrack(vr){
  ctx.lineCap = "round"; ctx.lineJoin = "round";
  // puentes primero (tablero bajo la vía)
  for (const seg of segs.values()){
    if (!seg.bridges.length || !segInView(seg, vr)) continue;
    for (const [b0, b1] of seg.bridges){
      const deck = new Path2D();
      let firstp = true;
      for (let s = b0; s <= b1; s += 7){
        const p = lutAt(seg, s);
        if (firstp){ deck.moveTo(p.x, p.y); firstp = false; } else deck.lineTo(p.x, p.y);
      }
      // sombra del puente sobre el agua
      ctx.save();
      ctx.translate(-4, 9);
      ctx.strokeStyle = "rgba(20,40,60,.25)"; ctx.lineWidth = 30; ctx.stroke(deck);
      ctx.restore();
      ctx.strokeStyle = "#6e4a2a"; ctx.lineWidth = 5;
      for (let s = b0 + 8; s < b1 - 4; s += 26){
        const p = lutAt(seg, s);
        const nx = -p.ty, ny = p.tx;
        ctx.beginPath();
        ctx.moveTo(p.x + nx * 12, p.y + ny * 12); ctx.lineTo(p.x + nx * 12, p.y + ny * 12 + 16);
        ctx.moveTo(p.x - nx * 12, p.y - ny * 12); ctx.lineTo(p.x - nx * 12, p.y - ny * 12 + 16);
        ctx.stroke();
      }
      ctx.strokeStyle = "#8a5a2e"; ctx.lineWidth = 30; ctx.stroke(deck);
      ctx.strokeStyle = "#a9743f"; ctx.lineWidth = 24; ctx.stroke(deck);
      // barandillas
      ctx.strokeStyle = "#c98c4b"; ctx.lineWidth = 2.5;
      for (const sgn of [1, -1]){
        ctx.beginPath();
        let f2 = true;
        for (let s = b0; s <= b1; s += 7){
          const p = lutAt(seg, s);
          const x = p.x - p.ty * 13 * sgn, y = p.y + p.tx * 13 * sgn - 6;
          if (f2){ ctx.moveTo(x, y); f2 = false; } else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }
  }
  // balasto + traviesas + raíles
  for (const seg of segs.values()){
    if (!segInView(seg, vr)) continue;
    if (!seg.paths) buildSegPaths(seg);
    // terraplén: lado sur más oscuro para dar elevación
    ctx.save();
    ctx.translate(2.5, 5);
    ctx.strokeStyle = "rgba(90,72,44,.55)"; ctx.lineWidth = 24; ctx.stroke(seg.paths.bal);
    ctx.restore();
    ctx.strokeStyle = "#a8956f"; ctx.lineWidth = 24; ctx.stroke(seg.paths.bal);
    ctx.strokeStyle = "#c3b190"; ctx.lineWidth = 20; ctx.stroke(seg.paths.bal);
    ctx.strokeStyle = "rgba(140,120,90,.5)"; ctx.lineWidth = 22; ctx.setLineDash([2, 7]); ctx.stroke(seg.paths.bal); ctx.setLineDash([]);
    // traviesas con canto
    ctx.save();
    ctx.translate(0.8, 1.6);
    ctx.strokeStyle = "rgba(60,40,20,.55)"; ctx.lineWidth = 3.4; ctx.stroke(seg.paths.ties);
    ctx.restore();
    ctx.strokeStyle = "#8a6238"; ctx.lineWidth = 3.4; ctx.stroke(seg.paths.ties);
    // raíles: alma oscura + cabeza brillante desplazada arriba (relieve)
    ctx.save();
    ctx.translate(0, 1.4);
    ctx.strokeStyle = "#3f3f46"; ctx.lineWidth = 2.8;
    ctx.stroke(seg.paths.rL); ctx.stroke(seg.paths.rR);
    ctx.restore();
    ctx.strokeStyle = "#8b8d95"; ctx.lineWidth = 2.4;
    ctx.stroke(seg.paths.rL); ctx.stroke(seg.paths.rR);
    ctx.strokeStyle = "#d9dce4"; ctx.lineWidth = 1;
    ctx.stroke(seg.paths.rL); ctx.stroke(seg.paths.rR);
  }
  // topes en extremos abiertos (bloque con volumen)
  for (const n of nodes.values()){
    if (n.segs.length !== 1) continue;
    const seg = segs.get(n.segs[0]);
    if (!seg || !segInView(seg, vr)) continue;
    const [ox, oy] = outwardTangent(seg, n.id);
    const bx = n.x - ox * 4, by = n.y - oy * 4;
    const nx = -oy, ny = ox;
    // sombra
    ctx.strokeStyle = "rgba(25,50,20,.3)"; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(bx + nx * 10 - 2, by + ny * 10 + 4); ctx.lineTo(bx - nx * 10 - 2, by - ny * 10 + 4); ctx.stroke();
    // postes verticales
    ctx.strokeStyle = "#5d3d20"; ctx.lineWidth = 3.4;
    for (const k of [1, -1]){
      ctx.beginPath();
      ctx.moveTo(bx + nx * 7 * k, by + ny * 7 * k);
      ctx.lineTo(bx + nx * 7 * k, by + ny * 7 * k - 9);
      ctx.stroke();
    }
    // travesaño elevado rojo/blanco
    ctx.strokeStyle = "#8a5a2e"; ctx.lineWidth = 5.5;
    ctx.beginPath(); ctx.moveTo(bx + nx * 10, by + ny * 10 - 8); ctx.lineTo(bx - nx * 10, by - ny * 10 - 8); ctx.stroke();
    ctx.strokeStyle = "#d9534f"; ctx.lineWidth = 3.4;
    ctx.beginPath(); ctx.moveTo(bx + nx * 9, by + ny * 9 - 8); ctx.lineTo(bx - nx * 9, by - ny * 9 - 8); ctx.stroke();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3.4; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(bx + nx * 9, by + ny * 9 - 8); ctx.lineTo(bx - nx * 9, by - ny * 9 - 8); ctx.stroke();
    ctx.setLineDash([]);
  }
  // andenes de estación (con canto y sombra)
  for (const st of stationsMap.values()){
    const nx = -st.ty, ny = st.tx;
    ctx.save();
    ctx.translate(st.x + nx * 21, st.y + ny * 21);
    ctx.rotate(Math.atan2(st.ty, st.tx));
    // sombra de contacto
    ctx.fillStyle = "rgba(25,50,20,.22)";
    rrectPath(ctx, -48, -8, 96, 22, 7); ctx.fill();
    // canto (pared del andén)
    ctx.fillStyle = "#a08753";
    rrectPath(ctx, -46, -8, 92, 20, 6); ctx.fill();
    // superficie elevada
    ctx.fillStyle = "#e2d3ab";
    rrectPath(ctx, -46, -13, 92, 20, 6); ctx.fill();
    ctx.strokeStyle = "#b8a26f"; ctx.lineWidth = 1.6;
    rrectPath(ctx, -46, -13, 92, 20, 6); ctx.stroke();
    // losas
    ctx.fillStyle = "rgba(180,150,90,.45)";
    for (let i = -3; i <= 3; i++) ctx.fillRect(i * 12 - 1, -13, 2, 20);
    // línea amarilla de seguridad
    ctx.fillStyle = "rgba(240,190,60,.85)";
    ctx.fillRect(-44, -12, 88, 2);
    ctx.restore();
  }
}
/* ---------------- agujas ---------------- */
function drawSwitches(vr){
  for (const [nodeIdSw, sw] of switches){
    const n = nodes.get(nodeIdSw);
    if (!n || n.x < vr.x0 || n.x > vr.x1 || n.y < vr.y0 || n.y > vr.y1) continue;
    if (sw.anim > 0) sw.anim = Math.max(0, sw.anim - 0.08);
    // atenuar ramas no activas
    for (const opt of sw.options){
      if (opt === sw.active) continue;
      const sg = segs.get(opt);
      if (!sg) continue;
      ctx.strokeStyle = "rgba(60,60,60,.30)";
      ctx.lineWidth = 15; ctx.lineCap = "round";
      ctx.beginPath();
      const from = sg.a === nodeIdSw;
      let started = false;
      for (let s = 2; s < Math.min(30, sg.len - 2); s += 6){
        const p = lutAt(sg, from ? s : sg.len - s);
        if (!started){ ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
    }
    // rama activa iluminada
    const act = segs.get(sw.active);
    if (act){
      ctx.strokeStyle = "rgba(120,220,90,.5)";
      ctx.lineWidth = 13; ctx.lineCap = "round";
      ctx.beginPath();
      const from = act.a === nodeIdSw;
      let started = false;
      for (let s = 2; s < Math.min(34, act.len - 2); s += 6){
        const p = lutAt(act, from ? s : act.len - s);
        if (!started){ ctx.moveTo(p.x, p.y); started = true; } else ctx.lineTo(p.x, p.y);
      }
      ctx.stroke();
      // flecha grande (apunta hacia dentro de la rama activa para distinguirla)
      const pin = lutAt(act, from ? Math.min(28, act.len * 0.5) : act.len - Math.min(28, act.len * 0.5));
      let dxA = pin.x - n.x, dyA = pin.y - n.y;
      const mA = Math.hypot(dxA, dyA) || 1; dxA /= mA; dyA /= mA;
      const ax = n.x + dxA * 30, ay = n.y + dyA * 30;
      const popA = 1 + (sw.anim || 0) * 0.5;
      ctx.fillStyle = "#ffde3d"; ctx.strokeStyle = "#b8860b"; ctx.lineWidth = 2.5;
      ctx.save();
      ctx.translate(ax, ay); ctx.rotate(Math.atan2(dyA, dxA)); ctx.scale(popA, popA);
      ctx.beginPath();
      ctx.moveTo(10, 0); ctx.lineTo(-7, -9); ctx.lineTo(-3, 0); ctx.lineTo(-7, 9); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
    // palanca sobre poste (relieve vertical)
    const pop = 1 + (sw.anim || 0) * 0.6;
    // base
    ctx.fillStyle = "rgba(25,50,20,.3)";
    ctx.beginPath(); ctx.ellipse(n.x - 1.5, n.y + 2.5, 9, 4, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#6e665a";
    ctx.beginPath(); ctx.ellipse(n.x, n.y, 7.5, 4.5, 0, 0, TAU); ctx.fill();
    // poste
    ctx.strokeStyle = "#4e463c"; ctx.lineWidth = 3.6;
    ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(n.x, n.y - 13); ctx.stroke();
    // pomo con brillo
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(n.x, n.y - 15, 9.5 * pop, 0, TAU); ctx.fill();
    ctx.fillStyle = "#e0393e";
    ctx.beginPath(); ctx.arc(n.x, n.y - 15, 6.8 * pop, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#8c1f22"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(n.x, n.y - 15, 6.8 * pop, 0, TAU); ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,.5)";
    ctx.beginPath(); ctx.arc(n.x - 2.4, n.y - 17.5, 2.2 * pop, 0, TAU); ctx.fill();
  }
}
/* ---------------- helpers de dibujo ---------------- */
function rrectPath(c, x, y, w, h, r){
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}
/* ---------------- entidades ordenadas por profundidad ---------------- */
function collectEntities(vr){
  const ents = [];
  for (const d of decor){
    if (d.type === "lake" || d.type === "flower") continue;
    if (d.x < vr.x0 - 150 || d.x > vr.x1 + 150 || d.y < vr.y0 - 150 || d.y > vr.y1 + 150) continue;
    ents.push({ y: d.y, kind: "decor", d });
  }
  for (const h of hills){
    if (h.x + h.rx < vr.x0 || h.x - h.rx > vr.x1 || h.y + h.ry < vr.y0 || h.y - h.ry > vr.y1) continue;
    ents.push({ y: h.y + h.ry * 0.4, kind: "hill", h });
  }
  for (const st of stationsMap.values()){
    const bx = st.x - st.ty * 52, by = st.y + st.tx * 52;
    if (bx < vr.x0 || bx > vr.x1 || by < vr.y0 || by > vr.y1) continue;
    ents.push({ y: by, kind: "stationHouse", x: bx, yy: by, st });
  }
  for (const t of trains){
    const cars = carList(t);
    for (let ci = 0; ci < cars.length; ci++){
      const car = cars[ci];
      const p = trainPosAt(t, car.mid);
      if (pointInAnyHill(p.x, p.y, 0.86)) continue;
      if (p.x < vr.x0 || p.x > vr.x1 || p.y < vr.y0 || p.y > vr.y1) continue;
      ents.push({ y: p.y, kind: "car", t, car, p, ci });
    }
  }
  ents.sort((a, b) => a.y - b.y);
  return ents;
}
function drawEntity(e){
  if (e.kind === "decor"){
    const d = e.d;
    let s = null;
    switch (d.type){
      case "tree": s = sprTree(d.v); break;
      case "pine": s = sprPine(d.v); break;
      case "bush": s = sprBush(d.v); break;
      case "house": s = sprHouse(d.v); break;
      case "barn": s = sprBarn(); break;
      case "cow": s = sprCow(d.v); break;
      case "sheep": s = sprSheep(d.v); break;
      case "person": s = sprPerson(d.v); break;
      case "mountain": s = sprMountain(d.v); break;
      case "footbridge": s = sprFootbridge(); break;
      case "windmill": drawWindmill(d); return;
    }
    if (s) drawSprite(s, d.x, d.y, d.s);
    // humo de chimenea de las casas
    if (d.type === "house" && quality > 0 && d.v > 0.4){
      if ((gameTime + d.v * 5) % 1.1 < 0.02) spawnSmoke(d.x + 15 * d.s, d.y - 62 * d.s, 0.55);
    }
  } else if (e.kind === "hill"){
    drawHill(e.h);
  } else if (e.kind === "stationHouse"){
    drawSprite(sprStationHouse(), e.x, e.yy, 1);
    drawStationFlags(e.st);
  } else if (e.kind === "car"){
    drawCar(e.t, e.car, e.p, e.ci);
  }
}
function drawWindmill(d){
  drawSprite(sprWindmillBody(), d.x, d.y, d.s);
  const [sx, sy] = proj(d.x, d.y - 66 * d.s);
  const r = 30 * d.s * cam.z, a0 = gameTime * 0.9;
  ctx.strokeStyle = "#7a4a20"; ctx.lineWidth = Math.max(1.5, 2.6 * cam.z);
  ctx.fillStyle = "rgba(246,238,215,.95)";
  for (let i = 0; i < 4; i++){
    const a = a0 + i * Math.PI / 2;
    const ex = sx + Math.cos(a) * r, ey = sy + Math.sin(a) * r * 0.9;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    const px = -Math.sin(a) * r * 0.16, py = Math.cos(a) * r * 0.14;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a) * r * 0.3, sy + Math.sin(a) * r * 0.27);
    ctx.lineTo(ex + px, ey + py);
    ctx.lineTo(ex - px * 0.2, ey - py * 0.2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  ctx.fillStyle = "#5a3a1a";
  ctx.beginPath(); ctx.arc(sx, sy, Math.max(2, 4 * d.s * cam.z), 0, TAU); ctx.fill();
}
function drawHill(h){
  const [sx, sy] = proj(h.x, h.y);
  const rx = h.rx * cam.z, ry = h.ry * cam.z * SQ * 1.55;
  const domeCy = sy - ry * 0.42;
  // sombra de contacto (hacia abajo-izquierda)
  ctx.fillStyle = "rgba(25,50,20,.20)";
  ctx.beginPath(); ctx.ellipse(sx - rx * 0.06, sy + ry * 0.30, rx * 1.02, ry * 0.42, 0, 0, TAU); ctx.fill();
  // falda de la colina (base más ancha y oscura)
  ctx.fillStyle = "#639b4e";
  ctx.beginPath(); ctx.ellipse(sx, sy + ry * 0.06, rx * 1.04, ry * 0.62, 0, 0, TAU); ctx.fill();
  // cúpula con luz arriba-izquierda
  const g = ctx.createRadialGradient(sx - rx * 0.34, domeCy - ry * 0.55, rx * 0.08, sx, domeCy, rx * 1.05);
  g.addColorStop(0, "#bce8a0");
  g.addColorStop(0.45, "#93cc74");
  g.addColorStop(0.8, "#6fae57");
  g.addColorStop(1, "#578f44");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(sx, domeCy, rx, ry * 1.08, 0, 0, TAU); ctx.fill();
  // terminator: sombra propia en el lado derecho-inferior
  ctx.fillStyle = "rgba(45,85,40,.30)";
  ctx.beginPath();
  ctx.ellipse(sx + rx * 0.18, domeCy + ry * 0.28, rx * 0.86, ry * 0.82, 0.12, -0.5, Math.PI + 0.6);
  ctx.fill();
  // línea de rasante (contacto cúpula-falda)
  ctx.strokeStyle = "rgba(60,100,50,.45)";
  ctx.lineWidth = Math.max(1, 2 * cam.z);
  ctx.beginPath(); ctx.ellipse(sx, domeCy, rx, ry * 1.08, 0, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
  // brillo superior
  ctx.strokeStyle = "rgba(255,255,230,.35)";
  ctx.lineWidth = Math.max(1, 3 * cam.z);
  ctx.beginPath(); ctx.ellipse(sx - rx * 0.12, domeCy - ry * 0.28, rx * 0.62, ry * 0.55, -0.15, Math.PI * 1.15, Math.PI * 1.75); ctx.stroke();
  // matas de hierba
  ctx.fillStyle = "rgba(70,120,55,.5)";
  for (let i = 0; i < 5; i++){
    const a = i * 1.7 + 0.5;
    const gx = sx + Math.cos(a) * rx * 0.5, gy = domeCy + Math.sin(a) * ry * 0.45;
    ctx.beginPath(); ctx.ellipse(gx, gy, 5 * cam.z, 2.2 * cam.z, 0, 0, TAU); ctx.fill();
  }
  // bocas de túnel
  for (const m of h.mouths){
    const [mx, my] = proj(m.x, m.y);
    const rw = 21 * cam.z, rh = 27 * cam.z;
    const lw = Math.max(1, cam.z);
    ctx.save();
    ctx.translate(mx, my - 6 * cam.z);
    // apron rocoso (la montaña se abre en roca alrededor del portal)
    ctx.fillStyle = "#8f8877";
    ctx.beginPath(); ctx.ellipse(0, -rh * 0.15, rw * 1.7, rh * 1.5, 0, Math.PI, 0, false);
    ctx.lineTo(rw * 1.7, 6 * cam.z); ctx.lineTo(-rw * 1.7, 6 * cam.z); ctx.closePath(); ctx.fill();
    // manchas de roca
    ctx.fillStyle = "rgba(90,84,72,.5)";
    ctx.beginPath(); ctx.ellipse(-rw * 0.9, -rh * 0.7, rw * 0.5, rh * 0.4, 0.3, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rw * 1.0, -rh * 0.5, rw * 0.45, rh * 0.5, -0.3, 0, TAU); ctx.fill();
    // portal de piedra (anillo claro)
    ctx.fillStyle = "#b8b0a0";
    ctx.beginPath(); ctx.ellipse(0, 0, rw * 1.32, rh * 1.1, 0, Math.PI, 0, false); ctx.lineTo(rw * 1.32, 5 * cam.z); ctx.lineTo(-rw * 1.32, 5 * cam.z); ctx.closePath(); ctx.fill();
    // sombreado del portal (lado derecho)
    ctx.fillStyle = "rgba(0,0,0,.16)";
    ctx.beginPath(); ctx.ellipse(0, 0, rw * 1.32, rh * 1.1, 0, -0.55, 0, false); ctx.lineTo(rw * 1.32, 5 * cam.z); ctx.lineTo(rw * 0.6, 5 * cam.z); ctx.closePath(); ctx.fill();
    // dovelas de piedra alrededor del arco
    const nV = 11;
    for (let i = 0; i <= nV; i++){
      const a = Math.PI + (i / nV) * Math.PI;
      const r0w = rw * 1.05, r0h = rh * 0.9, r1w = rw * 1.34, r1h = rh * 1.12;
      const x0 = Math.cos(a) * r0w, y0 = Math.sin(a) * r0h;
      const x1 = Math.cos(a) * r1w, y1 = Math.sin(a) * r1h;
      const a2 = Math.PI + ((i + 1) / nV) * Math.PI;
      const x0b = Math.cos(a2) * r0w, y0b = Math.sin(a2) * r0h;
      const x1b = Math.cos(a2) * r1w, y1b = Math.sin(a2) * r1h;
      ctx.fillStyle = i % 2 === 0 ? "#cfc7b6" : "#a49c8b";
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.lineTo(x1b, y1b); ctx.lineTo(x0b, y0b); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = "rgba(70,64,54,.4)"; ctx.lineWidth = lw; ctx.stroke();
    }
    // clave (keystone) arriba
    ctx.fillStyle = "#ddd5c2";
    ctx.beginPath(); ctx.moveTo(-4 * cam.z, -rh * 1.02); ctx.lineTo(4 * cam.z, -rh * 1.02); ctx.lineTo(6 * cam.z, -rh * 1.28); ctx.lineTo(-6 * cam.z, -rh * 1.28); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(70,64,54,.5)"; ctx.lineWidth = lw; ctx.stroke();
    // hueco oscuro con degradado de profundidad
    const tg = ctx.createRadialGradient(0, -rh * 0.35, rw * 0.1, 0, -rh * 0.2, rw * 0.95);
    tg.addColorStop(0, "#171310"); tg.addColorStop(0.55, "#2c2620"); tg.addColorStop(1, "#3f382f");
    ctx.fillStyle = tg;
    ctx.beginPath(); ctx.ellipse(0, 0, rw * 0.86, rh * 0.82, 0, Math.PI, 0, false); ctx.lineTo(rw * 0.86, 5 * cam.z); ctx.lineTo(-rw * 0.86, 5 * cam.z); ctx.closePath(); ctx.fill();
    // rieles que se hunden en la oscuridad
    ctx.strokeStyle = "rgba(120,120,130,.5)"; ctx.lineWidth = Math.max(1, 1.4 * cam.z);
    for (const sgn of [-1, 1]){
      ctx.beginPath();
      ctx.moveTo(sgn * rw * 0.34, 5 * cam.z);
      ctx.lineTo(sgn * rw * 0.08, -rh * 0.5);
      ctx.stroke();
    }
    // brillo del borde interior (media luna de luz)
    ctx.strokeStyle = "rgba(255,240,200,.35)"; ctx.lineWidth = Math.max(1, 1.4 * cam.z);
    ctx.beginPath(); ctx.ellipse(0, -1.5 * cam.z, rw * 0.9, rh * 0.86, 0, Math.PI * 1.08, Math.PI * 1.62, false); ctx.stroke();
    // hierba/escombros a los pies del portal
    ctx.fillStyle = "rgba(70,120,55,.6)";
    for (let i = 0; i < 4; i++){
      const gx = (-1.1 + i * 0.72) * rw;
      ctx.beginPath(); ctx.ellipse(gx, 4 * cam.z, 5 * cam.z, 2.4 * cam.z, 0, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }
}
function drawStationFlags(st){
  const [sx, sy] = proj(st.x - st.ty * 52, st.y + st.tx * 52);
  for (const k of [-1, 1]){
    const fx = sx + k * 40 * cam.z, fy = sy - 4 * cam.z;
    ctx.strokeStyle = "#7a5a30"; ctx.lineWidth = Math.max(1, 2 * cam.z);
    ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 26 * cam.z); ctx.stroke();
    const wav = Math.sin(gameTime * 3 + k) * 3 * cam.z;
    ctx.fillStyle = k > 0 ? "#e0393e" : "#2f7fe0";
    ctx.beginPath();
    ctx.moveTo(fx, fy - 26 * cam.z);
    ctx.quadraticCurveTo(fx + 8 * cam.z * k, fy - 24 * cam.z + wav, fx + 15 * cam.z * k, fy - 22 * cam.z + wav);
    ctx.lineTo(fx, fy - 17 * cam.z);
    ctx.closePath(); ctx.fill();
  }
}
/* ---------------- dibujo de vagones y locomotora ---------------- */
function hexShade(hex, k){
  const n = parseInt(hex.slice(1), 16);
  const r = clamp(Math.round(((n >> 16) & 255) * k), 0, 255);
  const g = clamp(Math.round(((n >> 8) & 255) * k), 0, 255);
  const b = clamp(Math.round((n & 255) * k), 0, 255);
  return `rgb(${r},${g},${b})`;
}
function carTransform(p, lift){
  const [sx, sy] = proj(p.x, p.y);
  const cA = Math.cos(p.ang), sA = Math.sin(p.ang);
  const z = cam.z;
  ctx.setTransform(DPR * z * cA, DPR * z * sA * SQ, DPR * z * -sA, DPR * z * cA * SQ, DPR * sx, DPR * (sy - (lift || 0) * z));
}
function carBodyPath(kind, L){
  if (kind === "loco"){
    rrectPath(ctx, -L / 2, -8, L, 16, 5);
  } else if (kind === "cisterna"){
    rrectPath(ctx, -L / 2 + 2, -7, L - 4, 14, 7);
  } else {
    rrectPath(ctx, -L / 2, -7.5, L, 15, 4);
  }
}
function drawCar(t, car, p, ci){
  const col = TRAIN_COLORS[t.color];
  const H = car.kind === "loco" ? 6 : 5;      // altura de extrusión
  const shk = t.shake > 0 ? Math.sin(gameTime * 55 + ci) * 2.2 * Math.max(0, t.shake) : 0;
  // sombra proyectada (desplazada por el sol: abajo-izquierda)
  worldTransform();
  ctx.save();
  ctx.translate(p.x - 3, p.y + 4.5);
  ctx.rotate(p.ang);
  ctx.fillStyle = "rgba(25,50,20,.30)";
  ctx.beginPath(); ctx.ellipse(0, 0, car.len / 2 + 3, 11, 0, 0, TAU); ctx.fill();
  ctx.restore();
  const L = car.len;
  // ----- nivel 0: ruedas y bajos -----
  carTransform(p, shk * 0.4);
  ctx.fillStyle = "#22232a";
  if (car.kind === "loco"){
    for (const wx of [-15, -4, 7]){
      ctx.beginPath(); ctx.arc(wx, 6.8, 3.8, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(wx, -6.8, 3.8, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = "#3a3b44";
    for (const wx of [-15, -4, 7]){
      ctx.beginPath(); ctx.arc(wx, 6.8, 2, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(wx, -6.8, 2, 0, TAU); ctx.fill();
    }
    const ph = t.wheelPhase, ox = Math.cos(ph) * 2, oy = Math.sin(ph) * 1.4;
    ctx.strokeStyle = "#c8ccd4"; ctx.lineWidth = 1.7;
    ctx.beginPath(); ctx.moveTo(-15 + ox, 6.8 + oy); ctx.lineTo(7 + ox, 6.8 + oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-15 + ox, -6.8 - oy); ctx.lineTo(7 + ox, -6.8 - oy); ctx.stroke();
  } else {
    for (const wx of [-L / 2 + 6, L / 2 - 6]){
      ctx.beginPath(); ctx.arc(wx, 6.2, 3.1, 0, TAU); ctx.fill();
      ctx.beginPath(); ctx.arc(wx, -6.2, 3.1, 0, TAU); ctx.fill();
    }
  }
  // faldón/chasis oscuro que une ruedas y caja
  ctx.fillStyle = "#2b2c33";
  rrectPath(ctx, -L / 2 + 1, -6.5, L - 2, 13, 3); ctx.fill();
  // ----- lateral extruido (pared del vagón) -----
  const sideCol =
    car.kind === "loco" ? hexShade(col.d, 0.72) :
    car.kind === "mercancias" ? "#6d4a26" :
    car.kind === "cisterna" ? "#565f6b" :
    car.kind === "madera" ? "#4d3a24" : hexShade(col.d, 0.72);
  for (let lv = 1; lv <= H - 1; lv += 1.5){
    carTransform(p, lv + shk * 0.7);
    ctx.fillStyle = sideCol;
    carBodyPath(car.kind, L); ctx.fill();
  }
  // ----- nivel superior: caja detallada -----
  carTransform(p, H + shk);
  const hw = 8;
  if (car.kind === "loco"){
    // caldera
    const bg = ctx.createLinearGradient(0, -hw, 0, hw);
    bg.addColorStop(0, hexShade(col.c, 1.22)); bg.addColorStop(0.45, col.c); bg.addColorStop(1, col.d);
    ctx.fillStyle = bg;
    rrectPath(ctx, -6, -7, L / 2 + 4, 14, 6.5); ctx.fill();
    ctx.strokeStyle = col.d; ctx.lineWidth = 1.2;
    rrectPath(ctx, -6, -7, L / 2 + 4, 14, 6.5); ctx.stroke();
    // bandas de la caldera
    ctx.strokeStyle = "rgba(0,0,0,.22)"; ctx.lineWidth = 1;
    for (const bx of [2, 9]){
      ctx.beginPath(); ctx.moveTo(bx, -6.6); ctx.lineTo(bx, 6.6); ctx.stroke();
    }
    // cabina (más alta): pared
    ctx.fillStyle = hexShade(col.d, 0.85);
    rrectPath(ctx, -L / 2 + 2, -8.5, 16, 17, 3); ctx.fill();
    ctx.fillStyle = "#cfe8ff";
    ctx.fillRect(-L / 2 + 5, -6, 4.5, 12);
    ctx.strokeStyle = "rgba(0,0,0,.3)"; ctx.lineWidth = 1;
    ctx.strokeRect(-L / 2 + 5, -6, 4.5, 12);
    // domo
    ctx.fillStyle = hexShade(col.c, 1.1);
    ctx.beginPath(); ctx.arc(4, 0, 3.4, 0, TAU); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.35)";
    ctx.beginPath(); ctx.arc(3, -1, 1.4, 0, TAU); ctx.fill();
    // tope frontal
    ctx.fillStyle = "#c8483f";
    ctx.beginPath();
    ctx.moveTo(L / 2 + 1, -6); ctx.lineTo(L / 2 + 5.5, 0); ctx.lineTo(L / 2 + 1, 6); ctx.closePath(); ctx.fill();
    // faro
    if (t.speed > 4){
      ctx.fillStyle = "rgba(255,240,160,.9)";
      ctx.beginPath(); ctx.arc(L / 2 + 1.5, 0, 2.4, 0, TAU); ctx.fill();
      ctx.fillStyle = "rgba(255,240,160,.2)";
      ctx.beginPath(); ctx.moveTo(L / 2 + 2, 0); ctx.lineTo(L / 2 + 28, -9); ctx.lineTo(L / 2 + 28, 9); ctx.closePath(); ctx.fill();
    }
  } else if (car.kind === "pasajeros"){
    const bg = ctx.createLinearGradient(0, -hw, 0, hw);
    bg.addColorStop(0, hexShade(col.c, 1.2)); bg.addColorStop(0.5, col.c); bg.addColorStop(1, col.d);
    ctx.fillStyle = bg;
    rrectPath(ctx, -L / 2, -7.5, L, 15, 4); ctx.fill();
    ctx.strokeStyle = col.d; ctx.lineWidth = 1.2;
    rrectPath(ctx, -L / 2, -7.5, L, 15, 4); ctx.stroke();
    // techo con junquillo
    ctx.fillStyle = "rgba(255,255,255,.28)";
    rrectPath(ctx, -L / 2 + 2, -6, L - 4, 4, 2); ctx.fill();
    ctx.fillStyle = "#f6f2e8";
    rrectPath(ctx, -L / 2 + 3, -2.2, L - 6, 5, 2.5); ctx.fill();
    ctx.fillStyle = "#9ecdf2";
    for (let i = 0; i < 4; i++){
      ctx.fillRect(-L / 2 + 5 + i * (L - 10) / 4 + 1.2, -1.4, (L - 10) / 4 - 3.6, 3.6);
    }
  } else if (car.kind === "mercancias"){
    const bg = ctx.createLinearGradient(0, -hw, 0, hw);
    bg.addColorStop(0, "#b8834e"); bg.addColorStop(0.5, "#9c6b3c"); bg.addColorStop(1, "#7a4d24");
    ctx.fillStyle = bg;
    rrectPath(ctx, -L / 2, -7.5, L, 15, 3); ctx.fill();
    ctx.strokeStyle = "#5f3b1a"; ctx.lineWidth = 1.2;
    rrectPath(ctx, -L / 2, -7.5, L, 15, 3); ctx.stroke();
    ctx.strokeStyle = "rgba(95,59,26,.8)"; ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++){
      const x = -L / 2 + i * L / 4;
      ctx.beginPath(); ctx.moveTo(x, -7.5); ctx.lineTo(x, 7.5); ctx.stroke();
    }
    ctx.fillStyle = col.c;
    ctx.fillRect(-4, -4, 8, 8);
    ctx.strokeStyle = "rgba(0,0,0,.25)"; ctx.strokeRect(-4, -4, 8, 8);
  } else if (car.kind === "cisterna"){
    const bg = ctx.createLinearGradient(0, -7, 0, 7);
    bg.addColorStop(0, "#dbe4ee"); bg.addColorStop(0.4, "#aab7c5"); bg.addColorStop(1, "#6e7a87");
    ctx.fillStyle = bg;
    rrectPath(ctx, -L / 2 + 2, -7, L - 4, 14, 7); ctx.fill();
    ctx.strokeStyle = "#565f6b"; ctx.lineWidth = 1.2;
    rrectPath(ctx, -L / 2 + 2, -7, L - 4, 14, 7); ctx.stroke();
    // brillo cilíndrico
    ctx.fillStyle = "rgba(255,255,255,.45)";
    rrectPath(ctx, -L / 2 + 5, -5.5, L - 10, 2.6, 1.3); ctx.fill();
    // escotilla
    ctx.fillStyle = col.c;
    ctx.beginPath(); ctx.arc(0, 0, 3.4, 0, TAU); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.35)";
    ctx.beginPath(); ctx.arc(-1, -1, 1.3, 0, TAU); ctx.fill();
  } else if (car.kind === "madera"){
    ctx.fillStyle = "#6e5136";
    rrectPath(ctx, -L / 2, -7, L, 14, 2.5); ctx.fill();
    ctx.strokeStyle = "#4d3a24"; ctx.lineWidth = 1.1;
    rrectPath(ctx, -L / 2, -7, L, 14, 2.5); ctx.stroke();
    // troncos apilados (los de arriba más claros)
    const logs = [
      { y: 4.2, c: "#8a5a2e" }, { y: 0, c: "#9c6b3c" }, { y: -4.2, c: "#b98c54" }
    ];
    for (const lg of logs){
      ctx.fillStyle = lg.c;
      rrectPath(ctx, -L / 2 + 3, lg.y - 1.9, L - 6, 3.8, 1.9); ctx.fill();
      ctx.fillStyle = "#e8c890";
      ctx.beginPath(); ctx.arc(L / 2 - 4, lg.y, 1.8, 0, TAU); ctx.fill();
      ctx.fillStyle = "rgba(120,80,40,.7)";
      ctx.beginPath(); ctx.arc(L / 2 - 4, lg.y, 0.8, 0, TAU); ctx.fill();
    }
  }
  // ----- chimenea de la locomotora (más alta que el cuerpo) -----
  if (car.kind === "loco"){
    carTransform(p, H + shk);
    ctx.fillStyle = "#26262c";
    ctx.beginPath(); ctx.arc(L / 2 - 8, 0, 3.7, 0, TAU); ctx.fill();
    carTransform(p, H + 5 + shk);
    ctx.fillStyle = "#3a3a42";
    ctx.beginPath(); ctx.arc(L / 2 - 8, 0, 3.7, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#ffd94d"; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(L / 2 - 8, 0, 3, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#1c1c22";
    ctx.beginPath(); ctx.arc(L / 2 - 8, 0, 1.8, 0, TAU); ctx.fill();
    // techo de la cabina flotando por encima
    carTransform(p, H + 4 + shk);
    ctx.fillStyle = hexShade(col.d, 0.6);
    rrectPath(ctx, -L / 2 + 0.5, -9.5, 19, 19, 4); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.14)";
    rrectPath(ctx, -L / 2 + 2.5, -7.5, 15, 6, 3); ctx.fill();
  }
  screenTransform();
}
/* ---------------- partículas ---------------- */
function spawnSmoke(x, y, sc){
  if (particles.length > 90 * (quality + 1) / 3 + 40) return;
  particles.push({ type: "smoke", x, y, vx: rand(2, 9), vy: rand(-22, -14), life: 0, max: rand(1.6, 2.4), size: rand(4, 7) * (sc || 1), rot: rand(0, TAU), h: 14 * (sc || 1) });
}
function spawnSteam(x, y){
  particles.push({ type: "steam", x, y, vx: rand(-14, 14), vy: rand(-26, -8), life: 0, max: rand(0.5, 1), size: rand(3, 6), h: 6 });
}
function spawnCrashStars(x, y){
  for (let i = 0; i < 12; i++){
    const a = rand(0, TAU), sp = rand(30, 110);
    particles.push({ type: "star", x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0, max: rand(0.7, 1.2), size: rand(4, 8), rot: rand(0, TAU), vr: rand(-6, 6) });
  }
  particles.push({ type: "puff", x, y, vx: 0, vy: -6, life: 0, max: 0.7, size: 20 });
}
function spawnNotes(x, y){
  for (let i = 0; i < 3; i++){
    particles.push({ type: "note", x: x + rand(-8, 8), y: y + rand(-6, 0), vx: rand(-8, 8), vy: rand(-36, -22), life: -i * 0.15, max: 1.1, size: 13 });
  }
}
function spawnConfetti(){
  const n = quality > 0 ? 70 : 30;
  for (let i = 0; i < n; i++){
    screenParticles.push({
      x: rand(0, W), y: rand(-40, -5), vx: rand(-25, 25), vy: rand(50, 140),
      life: 0, max: rand(2, 3.4), size: rand(4, 8),
      color: pick(["#e0393e", "#2f7fe0", "#37b24d", "#f2b705", "#8e5bd6", "#ff8ac2"]),
      rot: rand(0, TAU), vr: rand(-8, 8), sway: rand(2, 6)
    });
  }
}
function updateParticles(dt){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.life += dt;
    if (p.life > p.max){ particles.splice(i, 1); continue; }
    if (p.life < 0) continue;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.type === "smoke" || p.type === "steam"){ p.vx += 6 * dt; p.vy *= (1 - 0.6 * dt); }
    if (p.type === "star"){ p.vy += 60 * dt; p.rot += p.vr * dt; }
  }
  for (let i = screenParticles.length - 1; i >= 0; i--){
    const p = screenParticles[i];
    p.life += dt;
    if (p.life > p.max){ screenParticles.splice(i, 1); continue; }
    p.x += (p.vx + Math.sin(p.life * p.sway) * 30) * dt;
    p.y += p.vy * dt;
    p.rot += p.vr * dt;
  }
}
function drawParticles(){
  screenTransform();
  for (const p of particles){
    if (p.life < 0) continue;
    const [sx, syg] = proj(p.x, p.y);
    const sy = syg - (p.h || 0) * cam.z;
    if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) continue;
    const k = p.life / p.max;
    if (p.type === "smoke"){
      ctx.fillStyle = `rgba(235,235,240,${0.5 * (1 - k)})`;
      ctx.beginPath(); ctx.arc(sx, sy, (p.size + k * 14) * cam.z, 0, TAU); ctx.fill();
    } else if (p.type === "steam"){
      ctx.fillStyle = `rgba(255,255,255,${0.7 * (1 - k)})`;
      ctx.beginPath(); ctx.arc(sx, sy, (p.size + k * 8) * cam.z, 0, TAU); ctx.fill();
    } else if (p.type === "star"){
      ctx.save();
      ctx.translate(sx, sy); ctx.rotate(p.rot);
      ctx.fillStyle = `rgba(255,215,60,${1 - k})`;
      const r = p.size * cam.z;
      ctx.beginPath();
      for (let i = 0; i < 5; i++){
        const a = i * TAU / 5 - Math.PI / 2;
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        const a2 = a + TAU / 10;
        ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (p.type === "puff"){
      ctx.fillStyle = `rgba(255,255,255,${0.55 * (1 - k)})`;
      ctx.beginPath(); ctx.arc(sx, sy, (p.size + k * 40) * cam.z, 0, TAU); ctx.fill();
    } else if (p.type === "note"){
      ctx.font = `${Math.max(10, p.size * cam.z)}px sans-serif`;
      ctx.globalAlpha = 1 - k;
      ctx.fillText("🎵", sx, sy);
      ctx.globalAlpha = 1;
    }
  }
}
function drawScreenParticles(){
  fxCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  fxCtx.clearRect(0, 0, W, H);
  for (const p of screenParticles){
    fxCtx.save();
    fxCtx.translate(p.x, p.y); fxCtx.rotate(p.rot);
    fxCtx.fillStyle = p.color;
    fxCtx.globalAlpha = clamp(1 - p.life / p.max * 0.7, 0, 1);
    fxCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    fxCtx.restore();
  }
}
/* ---------------- overlays de tren (selección, avisos) ---------------- */
function drawTrainOverlays(){
  screenTransform();
  for (const t of trains){
    const hp = trainPosAt(t, t.headS - LOCO_LEN / 2);
    const [sx, sy] = proj(hp.x, hp.y);
    // anillo de selección (borde brillante)
    if (t === selectedTrain && viewMode === "aerial"){
      const pulse = 1 + Math.sin(gameTime * 5) * 0.08;
      const rx = 40 * cam.z * pulse, ry = 26 * cam.z * pulse;
      ctx.save();
      // halo brillante exterior
      ctx.shadowColor = "rgba(255,215,60,.95)";
      ctx.shadowBlur = 22;
      ctx.strokeStyle = "rgba(255,224,90,.95)";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(sx, sy, rx, ry, 0, 0, TAU);
      ctx.stroke();
      // borde interior blanco discontinuo giratorio
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(255,255,255,.95)";
      ctx.lineWidth = 2.5;
      ctx.setLineDash([9, 7]);
      ctx.lineDashOffset = -gameTime * 22;
      ctx.beginPath();
      ctx.ellipse(sx, sy, rx, ry, 0, 0, TAU);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    // aviso de colisión
    if (t.warn > 0){
      const bob = Math.sin(gameTime * 9) * 5;
      ctx.font = `${Math.max(20, 30 * cam.z)}px sans-serif`;

function updateAmbient(dt){
  for (const c of clouds){
    c.x += c.v * dt;
    if (c.x > WORLD.w + 300) c.x = -300;
  }
  if (quality > 0){
    birdTimer -= dt;
    if (birdTimer <= 0 && birds.length < 3){
      birds.push({ x: -60, y: rand(160, 700), vx: rand(55, 90), vy: rand(-6, 6), ph: rand(0, TAU) });
      birdTimer = rand(9, 18);
    }
  }
  for (let i = birds.length - 1; i >= 0; i--){
    const b = birds[i];
    b.x += b.vx * dt; b.y += b.vy * dt; b.ph += dt * 9;
    if (b.x > WORLD.w + 80) birds.splice(i, 1);
  }
}
let birdTimer = 5;
function drawClouds(){
  screenTransform();

    const [sx, syg] = proj(c.x, c.y);
    const sy = syg - 88 * cam.z;   // altitud de la nube

function cabPathSamples(t, maxD, step){
  const pts = [], sws = [];
  let idx = t.route.length - 1;
  while (idx > 0 && t.cum[idx] > t.headS) idx--;
  let rec = { seg: t.route[idx].seg, dir: t.route[idx].dir };
  let sg = segs.get(rec.seg);
  if (!sg) return { pts, sws };
  let local = t.headS - t.cum[idx];
  let D = 0, guard = 0;
  while (D <= maxD && guard++ < 400){
    if (local > sg.len){
      const over = local - sg.len;
      const endNode = rec.dir === 1 ? sg.b : sg.a;
      const pE = rec.dir === 1 ? lutAt(sg, sg.len - 0.5) : lutAt(sg, 0.5);
      const fx = rec.dir === 1 ? pE.tx : -pE.tx, fy = rec.dir === 1 ? pE.ty : -pE.ty;
      if (switches.has(endNode)){
        const n = nodes.get(endNode);
        sws.push({ node: endNode, x: n.x, y: n.y, d: D - over });
      }
      const nxt = nextTraversal(endNode, fx, fy, sg.id);
      if (!nxt) break;
      sg = nxt.seg; rec = { seg: sg.id, dir: nxt.dir }; local = over;
      continue;
    }
    const sl = rec.dir === 1 ? local : sg.len - local;
    const p = lutAt(sg, sl);
    pts.push({ x: p.x, y: p.y, d: D });
    local += step; D += step;
  }
  return { pts, sws };
}
function renderCab(dt){
  const t = cabTrain;
  if (!t){ exitCab(); return; }
  screenTransform();
  ctx.clearRect(0, 0, W, H);
  const hp = trainPosAt(t, t.headS);

  const horizonY = H * 0.42, bottomY = H * 0.96;
  const D0 = 55, KX = W * 0.048;
  const persp = f => D0 / (D0 + f);
  const yAt = f => horizonY + (bottomY - horizonY) * persp(f);

  {

      ctx.fillStyle = "rgba(143,208,240,.85)";
